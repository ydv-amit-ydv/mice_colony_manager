<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mouse Colony Manager</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='[w3.org](http://www.w3.org/2000/svg)' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%90%AD%3C/text%3E%3C/svg%3E">
<style>
  :root {
    --bg: #f5f6f8;
    --panel: #ffffff;
    --line: #e2e5ea;
    --accent: #3b6ef5;
    --accent-soft: #eaf0ff;
    --text: #1f2430;
    --muted: #6b7280;
    --female: #d6336c;
    --male: #1c7ed6;
    --unknown: #868e96;
    --ok: #2f9e44;
    --ok-soft: #ebfbee;
    --warn: #e67700;
    --warn-soft: #fff4e6;
    --pending: #9c36b5;
    --pending-soft: #f8f0fc;
    --lock: #b08900;
    --lock-soft: #fff9db;
    --err: #e03131;
    --err-soft: #fff0f0;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
  }
  header {
    background: var(--panel);
    border-bottom: 1px solid var(--line);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    z-index: 20;
  }
  header h1 { font-size: 18px; margin: 0; flex: 0 0 auto; display:flex; align-items:center; gap:8px; }
  .version-badge {
    font-size: 11px; font-weight: 700; color: var(--accent);
    background: var(--accent-soft); border:1px solid #cdd9fb;
    padding: 2px 8px; border-radius: 20px; letter-spacing:.03em;
  }
  .colony-name {
    font-size: 14px; font-weight: 600; border: 1px solid var(--line);
    border-radius: 7px; padding: 7px 11px; min-width: 220px;
  }
  .colony-name:focus { outline: none; border-color: var(--accent); }
  .toolbar { display: flex; gap: 8px; flex-wrap: wrap; flex: 1; align-items:center; }
  button, .filebtn {
    border: 1px solid var(--line);
    background: var(--panel);
    color: var(--text);
    padding: 7px 13px;
    border-radius: 7px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: .15s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  button:hover, .filebtn:hover { border-color: var(--accent); color: var(--accent); }
  button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  button.primary:hover { background: #2f5ad8; color: #fff; }
  button.danger:hover { border-color: var(--female); color: var(--female); }
  button.tiny { padding: 4px 9px; font-size: 12px; }
  button:disabled, input:disabled, select:disabled {
    opacity: .55; cursor: not-allowed;
  }
  input[type=file] { display: none; }

  .paste-json {
    width: 150px;
    padding: 6px 9px;
    border: 1px dashed var(--line);
    border-radius: 7px;
    font-size: 12px;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }
  .paste-json:focus { outline: none; border-color: var(--accent); border-style: solid; }

  .stats {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-left: auto;
  }
  .stat {
    background: var(--accent-soft);
    border-radius: 8px;
    padding: 5px 12px;
    text-align: center;
    min-width: 60px;
  }
  .stat b { display: block; font-size: 18px; color: var(--accent); }
  .stat span { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
  .stat.clickable { cursor: pointer; }
  .stat.clickable:hover { outline: 2px solid var(--accent); }

  .colony-bar {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 10px; padding: 10px 14px; margin-bottom: 14px;
  }
  .colony-bar label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }

  .lockbar {
    display: flex; align-items: center; gap: 10px;
    background: var(--lock-soft); border: 1px solid #f0e6b0;
    border-radius: 8px; padding: 6px 12px; font-size: 13px;
  }
  .lockbar.unlocked { background: var(--ok-soft); border-color: #b2e2bd; }
  .lockbar b { font-weight: 700; }

  main { padding: 18px 20px 60px; max-width: 1700px; margin: 0 auto; }
  .searchbar { margin-bottom: 16px; display:flex; gap:10px; flex-wrap:wrap; align-items:center;}
  .searchbar input[type=text] {
    flex: 1; min-width: 220px;
    padding: 9px 12px; border: 1px solid var(--line); border-radius: 8px; font-size: 14px;
  }
  .filters { display:flex; gap:6px; flex-wrap:wrap; }
  .filters select, .filters button {
    padding: 8px 11px; border:1px solid var(--line); border-radius:8px; background:var(--panel); font-size:13px;
  }
  .filters button.active, .filters select.active { background: var(--accent); color:#fff; border-color: var(--accent); }

  .cage {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 12px;
    margin-bottom: 18px;
    overflow: hidden;
  }
  .cage.inactive { opacity: .7; }
  .cage.locked-card { border-color: #f0e6b0; }
  .cage-head {
    padding: 12px 16px;
    display: flex;
    gap: 16px;
    align-items: center;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--line);
    background: linear-gradient(0deg,#fafbfc,#fff);
  }
  .cage-head input, .cage-head select {
    border: 1px solid transparent;
    background: transparent;
    border-radius: 6px;
    padding: 3px 6px;
    font: inherit;
  }
  .cage-head input:focus, .cage-head select:focus, td input:focus, td select:focus,
  .lineage input:focus, .lineage select:focus {
    outline: none; border-color: var(--accent); background:#fff;
  }
  .cage-title { font-size: 16px; font-weight: 700; min-width: 110px; }
  .field { display: flex; flex-direction: column; gap: 1px; }
  .field label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing:.03em; }
  .field input, .field select { min-width: 110px; font-weight:500; }
  .field input[type=date] { min-width: 130px; }
  .cage-actions { margin-left: auto; display:flex; gap:6px; align-items:center; }

  .lineage-wrap { display:flex; gap:18px; flex-wrap:wrap; padding:10px 16px; border-bottom:1px solid var(--line); background:#fcfdff; }
  .lineage { border:1px solid var(--line); border-radius:10px; padding:8px 12px; min-width:300px; }
  .lineage h5 { margin:0 0 6px; font-size:12px; text-transform:uppercase; letter-spacing:.04em; }
  .lineage.female h5 { color: var(--female); }
  .lineage.male h5 { color: var(--male); }
  .lineage .row { display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end; }
  .lineage .field input, .lineage .field select { border:1px solid var(--line); background:#fff; }
  .lineage .resolve { font-size:11px; margin-top:6px; }
  .lineage .resolve.found { color: var(--ok); }
  .lineage .resolve.notfound { color: var(--warn); }
  .lineage .resolve.sexwarn { color: var(--err); background: var(--err-soft); border:1px solid #ffc9c9; border-radius:6px; padding:4px 8px; font-weight:600; }
  .lineage .resolve.dead { color: var(--warn); background: var(--warn-soft); border:1px solid #ffd8a8; border-radius:6px; padding:4px 8px; font-weight:600; }
  .lineage-mode { display:flex; flex-direction:column; gap:1px; }
  .lineage-mode label { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.03em; }
  .lineage-mode select { min-width:130px; }
  .parent-disp { display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end; margin-top:8px; padding-top:8px; border-top:1px dashed var(--line); }
  .parent-disp .field input { border:1px solid var(--line); background:#fff; }
  .parent-disp .alive-box { display:flex; flex-direction:column; gap:2px; align-items:center; }
  .parent-disp .alive-box label { font-size:10px; color:var(--muted); text-transform:uppercase; }
  .linked-note { font-size:11px; color: var(--accent); margin-top:6px; }

  .status-badge { font-size:11px; padding:3px 9px; border-radius:20px; font-weight:600; }
  .status-active { background: var(--ok-soft); color: var(--ok); }
  .status-inactive { background:#f1f3f5; color: var(--muted); }
  .lock-badge { background: var(--lock-soft); color: var(--lock); }

  table { width: 100%; border-collapse: collapse; }
  th {
    text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing:.03em;
    color: var(--muted); padding: 8px 10px; border-bottom: 1px solid var(--line); background:#fbfcfd;
  }
  td { padding: 4px 8px; border-bottom: 1px solid #f0f1f4; vertical-align: middle; }
  tr:hover td { background: #fafbff; }
  td input, td select { width: 100%; border: 1px solid transparent; background: transparent; padding: 5px 6px; border-radius: 6px; font: inherit; }
  td input[type=date] { min-width: 130px; }
  td.id-col input { font-weight: 600; }
  .sex-Female { color: var(--female); font-weight:600; }
  .sex-Male { color: var(--male); font-weight:600; }
  .sex-Unknown { color: var(--unknown); font-weight:600; }
  .age-cell { font-size:13px; color: var(--muted); white-space:nowrap; }
  .age-cell.wean-ready { color: var(--warn); font-weight:700; }
  .samp-Pending { color: var(--pending); }
  .samp-Sample\ collected { color: var(--warn); }
  .samp-Confirmed { color: var(--ok); }
  .samp-Not\ confirmed { color: var(--female); }
  .row-del { color: var(--muted); cursor:pointer; border:none; background:none; font-size:16px; padding:0 4px;}
  .row-del:hover { color: var(--female); }
  .wean-tag { font-size:10px; background:var(--warn-soft); color:var(--warn); padding:1px 6px; border-radius:10px; margin-left:5px; font-weight:700; }
  .parent-tag { font-size:10px; background:var(--accent-soft); color:var(--accent); padding:1px 6px; border-radius:10px; margin-left:5px; font-weight:700; }
  .empty { padding: 50px; text-align:center; color: var(--muted); }
  .pill { font-size:11px; padding:2px 8px; border-radius:20px; background:var(--accent-soft); color:var(--accent); }
  .note-cell input { color: var(--muted); font-size:13px; min-width: 220px; }

  .breeding { padding: 10px 16px; border-top: 1px dashed var(--line); background:#fbfcfd; }
  .breeding h4 { margin:0 0 8px; font-size:12px; text-transform:uppercase; letter-spacing:.04em; color:var(--muted); }
  .event-row { display:flex; gap:8px; align-items:center; margin-bottom:6px; flex-wrap:wrap; }
  .event-row.locked { background: var(--lock-soft); border-radius:6px; padding:3px 4px; }
  .event-row input, .event-row select { border:1px solid var(--line); border-radius:6px; padding:5px 7px; font:inherit; background:#fff; }
  .event-row .e-type { min-width:130px; }
  .event-row .e-date { min-width:140px; }
  .event-row .e-detail { flex:1; min-width:160px; }
  .event-lock { border:none; background:none; cursor:pointer; font-size:15px; padding:0 4px; color:var(--muted); }
  .event-lock.on { color: var(--lock); }
  .no-events { color:var(--muted); font-size:13px; margin-bottom:6px; }

  footer { text-align:center; color:var(--muted); font-size:12px; padding:20px; }
  .hint { font-size:12px; color:var(--muted); }
</style>
</head>
<body>
<header>
  <h1>🐭 Mouse Colony Manager <span class="version-badge">v2.7</span></h1>
  <div class="toolbar">
    <button class="primary" onclick="addCage()">＋ Mating</button>
    <label class="filebtn">⬆ Import JSON<input type="file" accept=".json" onchange="importJSON(this)"></label>
    <button onclick="exportCSV()">⬇ Export CSV</button>
    <button onclick="exportJSON()">⬇ Export JSON</button>
    <button onclick="copyJSON(this)">📋 Copy JSON</button>
    <button class="danger" onclick="clearAll()">Clear</button>
  </div>
  <div class="stats" id="stats"></div>
</header>

<main>
  <div class="colony-bar">
    <div class="field" style="flex:1; min-width:240px;">
      <label>Colony Name / Strain</label>
      <input class="colony-name" id="colonyName" placeholder="e.g. C57BL/6J — Lab A" oninput="onColonyNameInput(this.value)">
    </div>
  </div>

  <div id="lockbar" class="lockbar"></div>

  <div class="searchbar" style="margin-top:14px">
    <input type="text" id="search" placeholder="Search mating, mouse ID, sex, sample status, lineage, notes…" oninput="render()">
    <div class="filters">
      <select id="fSample" onchange="render()">
        <option value="">Sample: all</option>
        <option value="Sample collected">Sample collected</option>
        <option value="Pending">Pending</option>
        <option value="Confirmed">Confirmed</option>
        <option value="Not confirmed">Not confirmed</option>
        <option value="None">No status</option>
      </select>
      <button id="fWean" onclick="toggleWean()">Wean-ready only</button>
      <button id="fActive" onclick="toggleActive()">Active matings only</button>
    </div>
  </div>
  <div id="content"></div>
</main>

<footer>v2.7 — Auto-saved to this browser. Export to JSON for a complete backup (all details), or CSV for a quick-view snapshot. — Built for offline, cross-platform use.</footer>

<script>
/* ---------- Constants ---------- */
const APP_VERSION = '2.7';
const WEAN_AGE_DAYS = 21;
const SEXES = ['Female','Male','Unknown'];
const SAMPLE_STATUS = ['','Sample collected','Pending','Confirmed','Not confirmed'];
const EVENT_TYPES = ['Paired','Pregnant','Male separated','Female separated','Re-paired','Disbanded','Note'];
const STORAGE_KEY = 'mouseColony.v4';
const COLONY_NAME_KEY = 'mouseColony.colonyName';
const LOCK_KEY = 'mouseColony.masterCode';

const LINEAGE_MODES = ['Founder','Progeny of'];

/* ---------- Data model ---------- */
let colony = [];
let colonyName = '';
let filterWean = false;
let filterActive = false;
let editUnlocked = false;

function todayISO(){ return new Date().toISOString().slice(0,10); }

function blankMouse() {
  return { dob:'', mouseId:'', earPunch:'', sex:'Female', weaningDate:'',
           sampleStatus:'', disposition:'', dispositionDate:'', alive:true, notes:'',
           _new:true };
}
function blankCage() {
  return { cage:'New_Mating',
           femaleId:'', femaleLineage:'', femaleDob:'', femaleLineageMode:'Founder', femaleLineageParent:'',
           femaleDisposition:'', femaleDispositionDate:'', femaleAlive:true,
           maleId:'',   maleLineage:'',   maleDob:'',   maleLineageMode:'Founder',   maleLineageParent:'',
           maleDisposition:'', maleDispositionDate:'', maleAlive:true,
           datePaired:'', active:true,
           events:[], mice:[blankMouse()],
           _new:true };
}
function blankEvent(){ return { type:'Paired', date:todayISO(), detail:'', locked:false, _new:true }; }

/* ---------- Lock helpers ---------- */
function locked(obj){ return obj && obj._new !== true && !editUnlocked; }
function ro(obj){ return locked(obj) ? 'disabled' : ''; }

function hasMasterCode(){ return !!localStorage.getItem(LOCK_KEY); }
function setMasterCode(){
  const code = prompt('Set a master edit code. Imported/old data will be locked until this code is entered.');
  if(code==null || code==='') return;
  localStorage.setItem(LOCK_KEY, code);
  editUnlocked = false;
  alert('Master code set. Old data is now locked.');
  render();
}
function unlock(){
  if(!hasMasterCode()){ setMasterCode(); return; }
  const code = prompt('Enter master edit code to unlock old data:');
  if(code===null) return;
  if(code === localStorage.getItem(LOCK_KEY)){ editUnlocked = true; render(); }
  else alert('Incorrect code.');
}
function lockNow(){ editUnlocked = false; render(); }
function changeMasterCode(){
  if(hasMasterCode()){
    const cur = prompt('Enter current master code:');
    if(cur !== localStorage.getItem(LOCK_KEY)){ alert('Incorrect code.'); return; }
  }
  setMasterCode();
}
function clearMasterCode(){
  if(!hasMasterCode()) return;
  const cur = prompt('Enter current master code to remove the lock entirely:');
  if(cur !== localStorage.getItem(LOCK_KEY)){ alert('Incorrect code.'); return; }
  localStorage.removeItem(LOCK_KEY); editUnlocked = true; render();
}

function markAllOld(){
  colony.forEach(c=>{
    c._new = false;
    c.mice.forEach(m=> m._new = false);
    c.events.forEach(e=> e._new = false);
  });
}

/* ---------- Persistence ---------- */
function save(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(colony));
    localStorage.setItem(COLONY_NAME_KEY, colonyName);
  }catch(e){}
}
function load(){
  try{
    colonyName = localStorage.getItem(COLONY_NAME_KEY) || '';
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){ const d = JSON.parse(raw); if(Array.isArray(d)){ colony = d.map(normCage); return true; } }
  }catch(e){}
  return false;
}
function normCage(c){
  return {
    cage:c.cage||'',
    femaleId:c.femaleId||'',
    femaleLineage:c.femaleLineage||'', femaleDob:c.femaleDob||'',
    femaleLineageMode:c.femaleLineageMode||'Founder', femaleLineageParent:c.femaleLineageParent||'',
    femaleDisposition:c.femaleDisposition||'', femaleDispositionDate:c.femaleDispositionDate||'',
    femaleAlive: c.femaleAlive!==false,
    maleId:c.maleId||'',
    maleLineage:c.maleLineage||'', maleDob:c.maleDob||'',
    maleLineageMode:c.maleLineageMode||'Founder', maleLineageParent:c.maleLineageParent||'',
    maleDisposition:c.maleDisposition||'', maleDispositionDate:c.maleDispositionDate||'',
    maleAlive: c.maleAlive!==false,
    datePaired:c.datePaired||'',
    active: c.active!==false,
    events:(c.events||[]).map(e=>({type:e.type||'Note',date:e.date||'',detail:e.detail||'',locked:!!e.locked, _new:!!e._new})),
    mice:(c.mice||[]).map(m=>({...blankMouse(),...m, alive: m.alive!==false, _new:!!m._new})),
    _new:!!c._new
  };
}

/* ---------- Known-mouse index ----------
   A parent can be matched to ANY mouse (alive or not) so we can warn about
   sex mismatches and disposition. Prefer live mice, but still return dead ones.
*/
function findKnownMouse(id){
  id = String(id||'').trim();
  if(!id) return null;
  let dead = null;
  for(const c of colony){
    for(const m of c.mice){
      if(String(m.mouseId).trim() === id){
        if(m.alive) return { mouse:m, cage:c, alive:true };
        if(!dead) dead = { mouse:m, cage:c, alive:false };
      }
    }
  }
  return dead;
}
function lineageOfMouse(targetMouse){
  for(const c of colony){
    if(c.mice.includes(targetMouse)){
      return c.femaleLineage || c.maleLineage || '';
    }
  }
  return '';
}

/* ---------- ID uniqueness ---------- */
function allMouseIds(exceptMouse){
  const set = new Set();
  colony.forEach(c=>c.mice.forEach(m=>{
    if(m === exceptMouse) return;
    const id = String(m.mouseId||'').trim();
    if(id) set.add(id.toLowerCase());
  }));
  return set;
}
function isDuplicateId(id, exceptMouse){
  id = String(id||'').trim().toLowerCase();
  if(!id) return false;
  return allMouseIds(exceptMouse).has(id);
}

/* ---------- Age / weaning logic ---------- */
function ageDays(dob){
  if(!dob) return null;
  const d = new Date(dob+'T00:00:00');
  if(isNaN(d)) return null;
  const diff = Date.now() - d.getTime();
  return Math.floor(diff / 86400000);
}
function ageLabel(dob){
  const days = ageDays(dob);
  if(days===null) return '—';
  if(days<0) return 'future';
  const w = Math.floor(days/7), d = days%7;
  return `${w}w ${d}d`;
}
function isWeanReady(m){
  const days = ageDays(m.dob);
  return m.alive && days!==null && days>=WEAN_AGE_DAYS && !m.weaningDate;
}

/* ---------- Filters ---------- */
function toggleWean(){ filterWean=!filterWean; document.getElementById('fWean').classList.toggle('active',filterWean); render(); }
function toggleActive(){ filterActive=!filterActive; document.getElementById('fActive').classList.toggle('active',filterActive); render(); }

function onColonyNameInput(v){ colonyName = v; save(); }

function renderLockBar(){
  const el = document.getElementById('lockbar');
  if(!hasMasterCode()){
    el.className = 'lockbar';
    el.innerHTML = `🔓 <span>No master code set — all data is editable.</span>
      <button class="tiny" onclick="setMasterCode()">Set master code</button>`;
    return;
  }
  if(editUnlocked){
    el.className = 'lockbar unlocked';
    el.innerHTML = `🔓 <b>Unlocked</b> <span>— old/imported data is editable this session.</span>
      <button class="tiny" onclick="lockNow()">Lock now</button>
      <button class="tiny" onclick="changeMasterCode()">Change code</button>
      <button class="tiny" onclick="clearMasterCode()">Remove lock</button>`;
  } else {
    el.className = 'lockbar';
    el.innerHTML = `🔒 <b>Locked</b> <span>— old/imported data is read-only. Newly added items stay editable.</span>
      <button class="tiny primary" onclick="unlock()">Unlock to edit</button>`;
  }
}

/* ---------- Is a given mouse used as a parent anywhere? ---------- */
function parentRefsOfMouse(mouse){
  // returns array of {cage, which} where this mouse's id is used as parent
  const refs = [];
  const id = String(mouse.mouseId||'').trim().toLowerCase();
  if(!id) return refs;
  colony.forEach(c=>{
    if(String(c.femaleId||'').trim().toLowerCase()===id) refs.push({cage:c, which:'female'});
    if(String(c.maleId||'').trim().toLowerCase()===id)   refs.push({cage:c, which:'male'});
  });
  return refs;
}

/* ---------- Rendering ---------- */
function render() {
  save();
  renderLockBar();
  const cn = document.getElementById('colonyName');
  if(cn && cn.value !== colonyName) cn.value = colonyName;

  const q = document.getElementById('search').value.trim().toLowerCase();
  const sampleFilter = document.getElementById('fSample').value;
  const root = document.getElementById('content');
  root.innerHTML = '';
  updateStats();

  if (!colony.length) { root.innerHTML = '<div class="empty">No matings yet. Add one, or import a JSON file.</div>'; return; }

  let anyShown = false;

  colony.forEach((cage, ci) => {
    if(filterActive && !cage.active) return;

    cage.events.sort((a,b)=> (a.date||'').localeCompare(b.date||''));

    const matchMouse = m => {
      if(q && !(cageMatches(cage,q) || mouseHaystack(m).includes(q))) return false;
      if(filterWean && !isWeanReady(m)) return false;
      if(sampleFilter){
        if(sampleFilter==='None'){ if(m.sampleStatus) return false; }
        else if(m.sampleStatus!==sampleFilter) return false;
      }
      return true;
    };

    const visibleMice = cage.mice.map((m,mi)=>({m,mi})).filter(({m})=>matchMouse(m));
    const cageHeaderMatches = (!q || cageMatches(cage,q));
    const noMouseFilters = !filterWean && !sampleFilter;

    if(!visibleMice.length){
      if(!(noMouseFilters && cageHeaderMatches)) return;
    }
    anyShown = true;

    const cardLocked = locked(cage);
    const card = document.createElement('div');
    card.className = 'cage' + (cage.active?'':' inactive') + (cardLocked?' locked-card':'');

    const aliveCount = cage.mice.filter(m=>m.alive).length;
    const cDis = ro(cage);

    // header
    const head = document.createElement('div');
    head.className = 'cage-head';
    head.innerHTML = `
      <input class="cage-title" value="${esc(cage.cage)}" ${cDis} onchange="upd(${ci},'cage',this.value)">
      ${dateField('Date Paired', cage.datePaired, ci,'datePaired', cDis)}
      <span class="pill">${aliveCount} alive / ${cage.mice.length}</span>
      <span class="status-badge ${cage.active?'status-active':'status-inactive'}">${cage.active?'Active mating':'Inactive'}</span>
      ${cardLocked?'<span class="status-badge lock-badge">🔒 locked</span>':''}
      <div class="cage-actions">
        <button class="tiny" ${cDis} onclick="toggleCageActive(${ci})">${cage.active?'Mark inactive':'Mark active'}</button>
        <button class="tiny" ${cDis} onclick="addMouse(${ci})">＋ Progeny</button>
        <button class="tiny danger" ${cDis} onclick="delCage(${ci})">🗑 Mating</button>
      </div>`;
    card.appendChild(head);

    // lineage / parent block
    const lin = document.createElement('div');
    lin.className = 'lineage-wrap';
    lin.appendChild(parentBlock('female', cage, ci, cDis));
    lin.appendChild(parentBlock('male', cage, ci, cDis));
    card.appendChild(lin);

    // table
    const tbl = document.createElement('table');
    tbl.innerHTML = `<thead><tr>
      <th>Mouse ID</th><th>DOB</th><th>Age</th><th>Ear Punch</th><th>Sex</th>
      <th>Weaning Date</th><th>Sample Status</th><th>Disposition</th><th>Disp. Date</th>
      <th>Alive</th><th>Notes</th><th></th></tr></thead>`;
    const tb = document.createElement('tbody');
    const filtersOn = (q||filterWean||sampleFilter);
    const rowsToShow = filtersOn ? visibleMice : cage.mice.map((m,mi)=>({m,mi}));
    rowsToShow.forEach(({m,mi}) => {
      const weanReady = isWeanReady(m);
      const mDis = ro(m);
      const canKill = m.disposition.trim() && m.dispositionDate;
      const aliveDisabled = mDis || (m.alive && !canKill);
      const usedAsParent = parentRefsOfMouse(m).length > 0;
      const tr = document.createElement('tr');
      tr.dataset.ci = ci; tr.dataset.mi = mi;
      tr.innerHTML = `
        <td class="id-col"><input value="${esc(m.mouseId)}" ${mDis} placeholder="alphanumeric" onchange="updMouseId(${ci},${mi},this)">${usedAsParent?'<span class="parent-tag">PARENT</span>':''}</td>
        <td><input type="date" value="${esc(m.dob)}" ${mDis} onchange="updDob(${ci},${mi},this.value)"></td>
        <td class="age-cell ${weanReady?'wean-ready':''}">${ageLabel(m.dob)}${weanReady?'<span class="wean-tag">WEAN</span>':''}</td>
        <td><input value="${esc(m.earPunch)}" ${mDis} inputmode="numeric" placeholder="numeric" onchange="updEarPunch(${ci},${mi},this)"></td>
        <td><select class="sex-${esc(m.sex)}" ${mDis} onchange="updM(${ci},${mi},'sex',this.value);render()">
            ${SEXES.map(s=>`<option ${m.sex===s?'selected':''}>${s}</option>`).join('')}</select></td>
        <td><input type="date" value="${esc(m.weaningDate)}" ${mDis} onchange="updWeaning(${ci},${mi},this.value)"></td>
        <td><select class="samp-${esc(m.sampleStatus)}" ${mDis} onchange="updM(${ci},${mi},'sampleStatus',this.value);render()">
            ${SAMPLE_STATUS.map(s=>`<option value="${s}" ${m.sampleStatus===s?'selected':''}>${s||'—'}</option>`).join('')}</select></td>
        <td><input value="${esc(m.disposition)}" ${mDis} placeholder="e.g. culled / transferred" onchange="updMDisp(${ci},${mi},'disposition',this.value)"></td>
        <td><input type="date" value="${esc(m.dispositionDate)}" ${mDis} onchange="updMDisp(${ci},${mi},'dispositionDate',this.value)"></td>
        <td style="text-align:center" title="${m.alive && !canKill ? 'Fill Disposition + Disposition Date before marking not alive':''}">
            <input type="checkbox" ${m.alive?'checked':''} ${aliveDisabled?'disabled':''} onchange="setAlive(${ci},${mi},this.checked)"></td>
        <td class="note-cell"><input value="${esc(m.notes)}" ${mDis} onchange="updM(${ci},${mi},'notes',this.value)"></td>
        <td><button class="row-del" title="delete" ${mDis} onclick="delMouse(${ci},${mi})">×</button></td>`;
      tb.appendChild(tr);
    });
    tbl.appendChild(tb);
    card.appendChild(tbl);

    // breeding log
    const bd = document.createElement('div');
    bd.className = 'breeding';
    let evHtml = '<h4>Breeding events</h4>';
    if(!cage.events.length) evHtml += '<div class="no-events">No events logged yet.</div>';
    cage.events.forEach((ev,ei)=>{
      const evLocked = locked(cage) || ev.locked;
      const eDis = evLocked ? 'disabled' : '';
      const lockToggleDis = locked(cage) ? 'disabled' : '';
      const typeOpts = EVENT_TYPES.includes(ev.type) ? EVENT_TYPES : [ev.type, ...EVENT_TYPES];
      evHtml += `<div class="event-row ${ev.locked?'locked':''}">
        <button class="event-lock ${ev.locked?'on':''}" title="${ev.locked?'Unlock event (allow delete)':'Lock event (prevent delete)'}" ${lockToggleDis} onclick="toggleEventLock(${ci},${ei})">${ev.locked?'🔒':'🔓'}</button>
        <select class="e-type" ${eDis} onchange="updE(${ci},${ei},'type',this.value)">
          ${typeOpts.map(t=>`<option ${ev.type===t?'selected':''}>${esc(t)}</option>`).join('')}
        </select>
        <input class="e-date" type="date" value="${esc(ev.date)}" ${eDis} onchange="updE(${ci},${ei},'date',this.value)">
        <input class="e-detail" placeholder="detail (e.g. re-paired with S4)" value="${esc(ev.detail)}" ${eDis} onchange="updE(${ci},${ei},'detail',this.value)">
        <button class="row-del" title="${ev.locked?'Locked — cannot delete':'delete'}" ${ev.locked || locked(cage) ?'disabled':''} onclick="delEvent(${ci},${ei})">×</button>
      </div>`;
    });
    evHtml += `<button class="tiny" ${ro(cage)} onclick="addEvent(${ci})">＋ Event</button>`;
    bd.innerHTML = evHtml;
    card.appendChild(bd);

    root.appendChild(card);
  });

  if(!anyShown) root.innerHTML = '<div class="empty">No matings or mice match the current search/filters.</div>';
}

/* ---------- Parent (lineage) block ---------- */
function parentBlock(which, cage, ci, disabled){
  const isF = which==='female';
  const idKey   = isF ? 'femaleId'   : 'maleId';
  const linKey  = isF ? 'femaleLineage' : 'maleLineage';
  const dobKey  = isF ? 'femaleDob'  : 'maleDob';
  const modeKey = isF ? 'femaleLineageMode'   : 'maleLineageMode';
  const parKey  = isF ? 'femaleLineageParent' : 'maleLineageParent';
  const dispKey = isF ? 'femaleDisposition' : 'maleDisposition';
  const dispDateKey = isF ? 'femaleDispositionDate' : 'maleDispositionDate';
  const aliveKey = isF ? 'femaleAlive' : 'maleAlive';
  const expectedSex = isF ? 'Female' : 'Male';

  const idVal = cage[idKey];
  const known = findKnownMouse(idVal);
  const auto = !!known;

  const div = document.createElement('div');
  div.className = 'lineage '+which;

  // ----- Resolution / warnings -----
  let resolveHtml = '';
  if(idVal){
    if(known){
      const sexMismatch = known.mouse.sex !== expectedSex && known.mouse.sex !== 'Unknown';
      if(sexMismatch){
        resolveHtml += `<div class="resolve sexwarn">⚠ Sex mismatch — mouse "${esc(idVal)}" is recorded as <b>${esc(known.mouse.sex)}</b>, but is placed in the <b>${expectedSex}</b> slot. Check the ID or the recorded sex.</div>`;
      } else {
        resolveHtml += `<div class="resolve found">✓ Found ${known.alive?'live':''} mouse — lineage &amp; DOB auto-filled${known.mouse.sex==='Unknown'?' (sex is Unknown)':''}.</div>`;
      }
      if(!known.alive){
        resolveHtml += `<div class="resolve dead">⚠ This mouse is marked <b>not alive</b> in its progeny record${known.mouse.disposition?(' ('+esc(known.mouse.disposition)+')'):''}. Disposition is synced from there.</div>`;
      }
    } else {
      resolveHtml = `<div class="resolve notfound">Not found among recorded mice — enter lineage &amp; DOB manually.</div>`;
    }
  }

  // ----- Lineage controls -----
  let lineageControls = '';
  if(auto){
    const linDisplay = lineageOfMouse(known.mouse) || cage[linKey] || '—';
    lineageControls = `
      <div class="field">
        <label>Lineage (auto)</label>
        <input value="${esc(linDisplay)}" disabled>
      </div>
      <div class="field">
        <label>DOB (auto)</label>
        <input type="date" value="${esc(known.mouse.dob)}" disabled>
      </div>`;
  } else {
    const mode = cage[modeKey] || 'Founder';
    const parentField = mode==='Progeny of'
      ? `<div class="field"><label>Parent mating / line</label>
           <input value="${esc(cage[parKey])}" ${disabled} placeholder="e.g. M12 × M13"
             onchange="upd(${ci},'${parKey}',this.value)"></div>`
      : '';
    lineageControls = `
      <div class="lineage-mode">
        <label>Lineage type</label>
        <select ${disabled} onchange="upd(${ci},'${modeKey}',this.value);render()">
          ${LINEAGE_MODES.map(o=>`<option ${mode===o?'selected':''}>${o}</option>`).join('')}
        </select>
      </div>
      ${parentField}
      <div class="field"><label>Lineage / strain</label>
        <input value="${esc(cage[linKey])}" ${disabled} placeholder="strain"
          onchange="upd(${ci},'${linKey}',this.value)"></div>
      <div class="field"><label>DOB</label>
        <input type="date" value="${esc(cage[dobKey])}" ${disabled}
          onchange="upd(${ci},'${dobKey}',this.value)"></div>`;
  }

  // ----- Disposition for the parent -----
  // If linked to a recorded mouse, mirror that mouse's disposition (read-only here;
  // edit it on the progeny row). If standalone, edit it directly on the cage.
  let dispHtml = '';
  if(auto){
    const m = known.mouse;
    const canKill = m.disposition.trim() && m.dispositionDate;
    const aliveDisabled = ro(m) || (m.alive && !canKill);
    dispHtml = `
      <div class="parent-disp">
        <div class="field"><label>Disposition</label>
          <input value="${esc(m.disposition)}" placeholder="e.g. culled / retired"
            onchange="updParentLinkedDisp('${idVal.replace(/'/g,"\\'")}','disposition',this.value)"></div>
        <div class="field"><label>Disposition date</label>
          <input type="date" value="${esc(m.dispositionDate)}"
            onchange="updParentLinkedDisp('${idVal.replace(/'/g,"\\'")}','dispositionDate',this.value)"></div>
        <div class="alive-box"><label>Alive</label>
          <input type="checkbox" ${m.alive?'checked':''} ${aliveDisabled?'disabled':''}
            onchange="setParentLinkedAlive('${idVal.replace(/'/g,"\\'")}',this.checked)"></div>
      </div>
      <div class="linked-note">↔ Linked to progeny record — changes here also update that row.</div>`;
  } else {
    const aliveVal = cage[aliveKey] !== false;
    const canKill = (cage[dispKey]||'').trim() && cage[dispDateKey];
    const aliveDisabled = (disabled?true:false) || (aliveVal && !canKill);
    dispHtml = `
      <div class="parent-disp">
        <div class="field"><label>Disposition</label>
          <input value="${esc(cage[dispKey])}" ${disabled} placeholder="e.g. culled / retired"
            onchange="upd(${ci},'${dispKey}',this.value)"></div>
        <div class="field"><label>Disposition date</label>
          <input type="date" value="${esc(cage[dispDateKey])}" ${disabled}
            onchange="upd(${ci},'${dispDateKey}',this.value)"></div>
        <div class="alive-box"><label>Alive</label>
          <input type="checkbox" ${aliveVal?'checked':''} ${aliveDisabled?'disabled':''}
            onchange="setCageParentAlive(${ci},'${which}',this.checked)"></div>
      </div>`;
  }

  div.innerHTML = `
    <h5>${isF?'♀ Female':'♂ Male'}</h5>
    <div class="row">
      <div class="field"><label>Mouse #</label>
        <input value="${esc(idVal)}" ${disabled} placeholder="ID of existing mouse"
          onchange="upd(${ci},'${idKey}',this.value);render()"></div>
      ${lineageControls}
    </div>
    ${resolveHtml}
    ${dispHtml}`;
  return div;
}

/* ---------- Parent disposition: linked (synced to progeny row) ---------- */
function findMouseRefById(id){
  id = String(id||'').trim();
  if(!id) return null;
  for(let ci=0; ci<colony.length; ci++){
    const mice = colony[ci].mice;
    for(let mi=0; mi<mice.length; mi++){
      if(String(mice[mi].mouseId).trim() === id){
        // prefer a live one, but a single id is unique so first match is fine
        if(mice[mi].alive) return {ci, mi, mouse:mice[mi]};
      }
    }
  }
  // fall back to any (e.g. already dead)
  for(let ci=0; ci<colony.length; ci++){
    const mice = colony[ci].mice;
    for(let mi=0; mi<mice.length; mi++){
      if(String(mice[mi].mouseId).trim() === id) return {ci, mi, mouse:mice[mi]};
    }
  }
  return null;
}

function updParentLinkedDisp(id, key, val){
  const ref = findMouseRefById(id);
  if(!ref) return;
  if(locked(colony[ref.ci]) || locked(ref.mouse)){ render(); return; }
  ref.mouse[key] = val;
  save();
  render();
}
function setParentLinkedAlive(id, checked){
  const ref = findMouseRefById(id);
  if(!ref) return;
  const m = ref.mouse;
  if(locked(colony[ref.ci]) || locked(m)){ render(); return; }
  if(checked===false){
    if(!(m.disposition.trim() && m.dispositionDate)){
      alert('To mark this parent as not alive, fill in both Disposition and a Disposition Date first.');
      render(); return;
    }
  }
  m.alive = checked;
  save();
  render();
}

/* ---------- Parent disposition: standalone (cage-level) ---------- */
function setCageParentAlive(ci, which, checked){
  const c = colony[ci];
  if(locked(c)){ render(); return; }
  const dispKey = which==='female' ? 'femaleDisposition' : 'maleDisposition';
  const dispDateKey = which==='female' ? 'femaleDispositionDate' : 'maleDispositionDate';
  const aliveKey = which==='female' ? 'femaleAlive' : 'maleAlive';
  if(checked===false){
    if(!((c[dispKey]||'').trim() && c[dispDateKey])){
      alert('To mark this parent as not alive, fill in both Disposition and a Disposition Date first.');
      render(); return;
    }
  }
  c[aliveKey] = checked;
  save();
  render();
}

function field(label,val,ci,key,disabled=''){
  return `<div class="field"><label>${label}</label><input value="${esc(val||'')}" ${disabled} onchange="upd(${ci},'${key}',this.value)"></div>`;
}
function dateField(label,val,ci,key,disabled=''){
  return `<div class="field"><label>${label}</label><input type="date" value="${esc(val||'')}" ${disabled} onchange="upd(${ci},'${key}',this.value)"></div>`;
}

function updateStats(){
  let cages=colony.length, mice=0, alive=0, f=0, m=0, active=0, weanReady=0, pending=0, progeny=0;
  colony.forEach(c=>{
    if(c.active) active++;
    progeny += c.mice.length;
    c.mice.forEach(x=>{
      mice++;
      if(x.alive){ alive++; x.sex==='Female'?f++:(x.sex==='Male'?m++:0); }
      if(isWeanReady(x)) weanReady++;
      if(x.sampleStatus==='Pending') pending++;
    });
  });
  document.getElementById('stats').innerHTML =
    `<div class="stat"><b>${cages}</b><span>Matings</span></div>
     <div class="stat clickable" onclick="setActiveFilterOn()"><b style="color:var(--ok)">${active}</b><span>Active</span></div>
     <div class="stat"><b>${alive}</b><span>Alive</span></div>
     <div class="stat"><b style="color:var(--female)">${f}</b><span>Female</span></div>
     <div class="stat"><b style="color:var(--male)">${m}</b><span>Male</span></div>
     <div class="stat clickable" onclick="setWeanFilterOn()"><b style="color:var(--warn)">${weanReady}</b><span>Wean-ready</span></div>
     <div class="stat clickable" onclick="setSampleFilterPending()"><b style="color:var(--pending)">${pending}</b><span>Pending</span></div>
     <div class="stat"><b>${progeny}</b><span>Progeny</span></div>`;
}
function setWeanFilterOn(){ if(!filterWean) toggleWean(); }
function setActiveFilterOn(){ if(!filterActive) toggleActive(); }
function setSampleFilterPending(){ document.getElementById('fSample').value='Pending'; render(); }

/* ---------- Edit handlers ---------- */
function upd(ci,key,val){ if(locked(colony[ci]))return; colony[ci][key]=val; save(); }
function updM(ci,mi,key,val){ if(locked(colony[ci])||locked(colony[ci].mice[mi]))return; colony[ci].mice[mi][key]=val; save(); }
function updE(ci,ei,key,val){ const e=colony[ci].events[ei]; if(locked(colony[ci])||e.locked)return; e[key]=val; save(); }

/* Mouse disposition edits — re-render so that any parent block referencing this
   mouse stays in sync (the parent block reads disposition live). */
function updMDisp(ci,mi,key,val){
  if(locked(colony[ci])||locked(colony[ci].mice[mi]))return;
  colony[ci].mice[mi][key]=val;
  save();
  render();
}

function refreshRowAge(ci, mi){
  const m = colony[ci].mice[mi];
  document.querySelectorAll('tr[data-ci][data-mi]').forEach(tr=>{
    if(Number(tr.dataset.ci)===ci && Number(tr.dataset.mi)===mi){
      const ageCell = tr.querySelector('.age-cell');
      if(ageCell){
        const weanReady = isWeanReady(m);
        ageCell.className = 'age-cell' + (weanReady?' wean-ready':'');
        ageCell.innerHTML = ageLabel(m.dob) + (weanReady?'<span class="wean-tag">WEAN</span>':'');
      }
    }
  });
  updateStats();
}
function updDob(ci,mi,val){
  if(locked(colony[ci])||locked(colony[ci].mice[mi]))return;
  colony[ci].mice[mi].dob = val;
  save();
  // a parent block auto-fills DOB from a linked mouse — re-render if used as parent
  if(parentRefsOfMouse(colony[ci].mice[mi]).length){ render(); }
  else { refreshRowAge(ci, mi); }
}
function updWeaning(ci,mi,val){
  if(locked(colony[ci])||locked(colony[ci].mice[mi]))return;
  colony[ci].mice[mi].weaningDate = val;
  save();
  refreshRowAge(ci, mi);
}

/* Mouse ID edit — alphanumeric, must be unique */
function updMouseId(ci,mi,input){
  const m = colony[ci].mice[mi];
  if(locked(colony[ci])||locked(m)){ render(); return; }
  const raw = String(input.value||'').trim();
  const cleaned = raw.replace(/[^A-Za-z0-9]/g,'');
  if(cleaned !== raw){
    alert('Mouse ID must be alphanumeric (letters and numbers only). Invalid characters were removed.');
  }
  if(cleaned && isDuplicateId(cleaned, m)){
    alert('Duplicate Mouse ID "'+cleaned+'". IDs must be unique across the colony. Reverting.');
    input.value = m.mouseId;
    render();
    return;
  }
  m.mouseId = cleaned;
  save();
  render();
}

/* Ear punch edit — numeric only, may repeat across the colony */
function updEarPunch(ci,mi,input){
  const m = colony[ci].mice[mi];
  if(locked(colony[ci])||locked(m)){ render(); return; }
  const raw = String(input.value||'').trim();
  const cleaned = raw.replace(/[^0-9]/g,'');
  if(cleaned !== raw){
    alert('Ear Punch must be numeric (digits only). Non-numeric characters were removed.');
  }
  m.earPunch = cleaned;
  input.value = cleaned;
  save();
}

/* Alive ↔ disposition rule (progeny rows) */
function setAlive(ci,mi,checked){
  const m = colony[ci].mice[mi];
  if(locked(colony[ci])||locked(m)){ render(); return; }
  if(checked===false){
    if(!(m.disposition.trim() && m.dispositionDate)){
      alert('To mark a mouse as not alive, fill in both Disposition and a Disposition Date first.');
      render(); return;
    }
  }
  m.alive = checked;
  render();   // re-render keeps any parent block referencing this mouse in sync
}

function addCage(){ colony.push(blankCage()); render(); }
function delCage(ci){ if(locked(colony[ci]))return; if(confirm('Delete mating "'+colony[ci].cage+'" and all its progeny?')){ colony.splice(ci,1); render(); } }
function toggleCageActive(ci){ if(locked(colony[ci]))return; colony[ci].active=!colony[ci].active; render(); }

/* Add progeny: cage-aware then global ID; ear punch from cage-then-global numeric */
function addMouse(ci){
  if(locked(colony[ci]))return;
  const cage = colony[ci];
  const prev = cage.mice.length ? cage.mice[cage.mice.length-1] : null;
  const mo = blankMouse();
  mo.mouseId = nextMouseId(cage);
  mo.earPunch = nextEarPunch(cage);
  if(prev){
    mo.dob = prev.dob || '';
    mo.weaningDate = prev.weaningDate || '';
  }
  cage.mice.push(mo);
  render();
}
function delMouse(ci,mi){ if(locked(colony[ci])||locked(colony[ci].mice[mi]))return; colony[ci].mice.splice(mi,1); render(); }
function addEvent(ci){ if(locked(colony[ci]))return; colony[ci].events.push(blankEvent()); render(); }
function delEvent(ci,ei){ const e=colony[ci].events[ei]; if(locked(colony[ci])||e.locked)return; colony[ci].events.splice(ei,1); render(); }
function toggleEventLock(ci,ei){ if(locked(colony[ci]))return; const e=colony[ci].events[ei]; e.locked=!e.locked; render(); }
function clearAll(){ if(confirm('Clear everything? Export first if needed.')){ colony=[]; colonyName=''; const cn=document.getElementById('colonyName'); if(cn) cn.value=''; editUnlocked=true; render(); } }

/* ---------- Auto-increment helpers ----------
   nextMouseId: start from the highest numeric ID in the CURRENT cage, fall back
   to the global highest, then increment — but uniqueness is only ever checked
   against the global ID set (IDs must be unique colony-wide).
*/
function highestNumericIdIn(mice){
  let max = 0;
  mice.forEach(m=>{
    const s = String(m.mouseId||'').trim();
    const n = parseInt(s,10);
    if(!isNaN(n) && String(n) === s && n>max) max=n;
  });
  return max;
}
function nextMouseId(cage){
  // prefer continuing this cage's numbering, otherwise the global highest
  let base = cage ? highestNumericIdIn(cage.mice) : 0;
  const globalMax = highestNumericIdIn(colony.flatMap(c=>c.mice));
  if(globalMax > base) base = globalMax;

  const taken = allMouseIds(null);   // global uniqueness check only
  let candidate = base + 1;
  while(taken.has(String(candidate).toLowerCase())) candidate++;
  return String(candidate);
}

/* nextEarPunch: punches may repeat globally (e.g. 5 / 105 / 205), so we only
   continue the current cage's sequence and do NOT enforce global uniqueness. */
function highestNumericPunchIn(mice){
  let max = 0;
  mice.forEach(m=>{
    const n = parseInt(String(m.earPunch||'').trim(),10);
    if(!isNaN(n) && n>max) max=n;
  });
  return max;
}
function nextEarPunch(cage){
  let base = cage ? highestNumericPunchIn(cage.mice) : 0;
  if(base === 0){
    // no punch in this cage yet — seed from the global highest as a hint
    base = highestNumericPunchIn(colony.flatMap(c=>c.mice));
  }
  return String(base + 1);
}

/* ---------- Search matching ---------- */
function cageMatches(c,q){
  return [c.cage,c.femaleId,c.maleId,c.femaleLineage,c.maleLineage,c.femaleLineageParent,c.maleLineageParent,
          c.femaleDisposition,c.maleDisposition,c.datePaired].join(' ').toLowerCase().includes(q);
}
function mouseHaystack(m){
  return [m.mouseId,m.earPunch,m.sex,m.sampleStatus,m.disposition,m.notes,m.dob].join(' ').toLowerCase();
}

/* ---------- Helpers ---------- */
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ---------- JSON ---------- */
function buildJSON(){
  return JSON.stringify({version:APP_VERSION, colonyName, matings:colony}, null, 2);
}
function exportJSON(){
  download('mouse_colony.json', buildJSON(), 'application/json');
}

function copyJSON(btn){
  const text = buildJSON();
  const done = ()=>{
    const old = btn.textContent;
    btn.textContent = '✓ Copied';
    setTimeout(()=>{ btn.textContent = old; }, 1400);
  };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(()=>fallbackCopy(text, done));
  } else {
    fallbackCopy(text, done);
  }
}
function fallbackCopy(text, done){
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  try{ document.execCommand('copy'); done(); }
  catch(e){ alert('Copy failed — please use Export JSON instead.'); }
  document.body.removeChild(ta);
}

function loadParsed(parsed){
  let d;
  if(Array.isArray(parsed)){ d = parsed; }
  else if(parsed && Array.isArray(parsed.matings)){ d = parsed.matings; colonyName = parsed.colonyName||colonyName; }
  else throw new Error('bad shape');
  colony = d.map(normCage);
  markAllOld();
  editUnlocked = false;
  render();
}

function importJSON(input){
  const file=input.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=e=>{ try{ loadParsed(JSON.parse(e.target.result)); }
    catch{ alert('Invalid JSON file.'); } };
  r.readAsText(file); input.value='';
}

/* ---------- CSV ---------- */
const CSV_HEADERS = ['Colony/Strain','MATING','Female Parent ID','Female Parent Dob','Female Disposition',
  'Male Parent ID','Male Parent DOB','Male Disposition','Mouse ID','Ear Punch','Sex','DOB',
  'Weaning Date','Genotyping Status','Disposition','Disposition Date','Notes'];

function parentLabel(which, c){
  const isF = which === 'female';
  const id     = (isF ? c.femaleId     : c.maleId)     || '';
  const known  = findKnownMouse(id);

  if(known){
    const lineage = lineageOfMouse(known.mouse) || (isF ? c.femaleLineage : c.maleLineage) || '';
    return [lineage, 'Existing', id].filter(Boolean).join(' ').trim();
  }

  const lineage = (isF ? c.femaleLineage     : c.maleLineage)     || '';
  const mode    = (isF ? c.femaleLineageMode : c.maleLineageMode) || '';
  const ref = mode === 'Progeny of'
    ? ((isF ? c.femaleLineageParent : c.maleLineageParent) || '')
    : id;

  return [lineage, mode, ref].filter(Boolean).join(' ').trim();
}

/* Disposition label for a parent — pulled from the linked progeny row if it exists */
function parentDispLabel(which, c){
  const isF = which==='female';
  const id  = (isF ? c.femaleId : c.maleId) || '';
  const known = findKnownMouse(id);
  if(known){
    const m = known.mouse;
    return [m.disposition, m.dispositionDate, m.alive?'':'(not alive)'].filter(Boolean).join(' ').trim();
  }
  const disp = isF ? c.femaleDisposition : c.maleDisposition;
  const dispDate = isF ? c.femaleDispositionDate : c.maleDispositionDate;
  const alive = (isF ? c.femaleAlive : c.maleAlive) !== false;
  return [disp, dispDate, alive?'':'(not alive)'].filter(Boolean).join(' ').trim();
}

function exportCSV(){
  const rows = [CSV_HEADERS];

  colony.forEach(c=>{
    const meta = [
      colonyName,
      c.cage,
      parentLabel('female', c), c.femaleDob, parentDispLabel('female', c),
      parentLabel('male',   c), c.maleDob,   parentDispLabel('male', c)
    ];

    if(!c.mice.length){
      rows.push([...meta, '', '', '', '', '', '', '', '', '']);
      return;
    }

    c.mice.forEach(m=>{
      rows.push([...meta,
        m.mouseId, m.earPunch, m.sex, m.dob,
        m.weaningDate, m.sampleStatus, m.disposition, m.dispositionDate, m.notes
      ]);
    });
  });

  const csv = rows.map(r=>r.map(csvCell).join(',')).join('\r\n');
  download('mouse_colony.csv', csv, 'text/csv');
}

function csvCell(v){ v=String(v==null?'':v); return /[",\r\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v; }

function download(name, content, type){
  const blob=new Blob([content],{type}); const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=name; a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}

/* ---------- init ---------- */
if(!load()){ colony=[]; colonyName=''; editUnlocked=true; }
else {
  if(hasMasterCode()) editUnlocked=false; else editUnlocked=true;
}
{
  const cn=document.getElementById('colonyName'); if(cn) cn.value=colonyName;
}
render();
