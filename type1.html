<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colony Management System</title>
    <style>
        :root {
            --male-color: #4a90d9;
            --female-color: #e91e8c;
            --dead-color: #888;
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --bg-card: #1f2940;
            --text-primary: #e8e8e8;
            --text-secondary: #a0a0a0;
            --border-color: #2d3a4f;
            --accent: #4ecca3;
            --error: #ff6b6b;
            --warning: #ffd93d;
        }

        body.theme-light {
            --bg-primary: #f0f4f8;
            --bg-secondary: #ffffff;
            --bg-card: #e8edf3;
            --text-primary: #1a1a2e;
            --text-secondary: #556070;
            --border-color: #ccd6e0;
            --accent: #1a9e7a;
            --error: #d93025;
            --warning: #e08c00;
            --dead-color: #666;
        }

        /* Collapsible sidebar sections */
        .sidebar-section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            padding: 4px 0;
            user-select: none;
        }

        .sidebar-section-header:hover h3 {
            color: var(--accent);
        }

        .sidebar-section-header h3 {
            margin-bottom: 0;
            transition: color 0.2s;
        }

        .collapse-arrow {
            font-size: 0.7rem;
            color: var(--text-secondary);
            transition: transform 0.25s;
        }

        .sidebar-section-header.collapsed .collapse-arrow {
            transform: rotate(-90deg);
        }

        .sidebar-collapsible {
            overflow: hidden;
            transition: max-height 0.3s ease, opacity 0.3s ease;
            max-height: 2000px;
            opacity: 1;
        }

        .sidebar-collapsible.collapsed {
            max-height: 0;
            opacity: 0;
        }

        /* Sidebar list items (matings, litters, events) */
        .sidebar-record-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 8px;
        }

        .sidebar-record-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            background: var(--bg-card);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
            font-size: 0.85rem;
        }

        .sidebar-record-item:hover {
            border-color: var(--accent);
        }

        .sidebar-record-item.selected {
            border-color: var(--accent);
            background: rgba(78, 204, 163, 0.1);
        }

        .record-icon {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.95rem;
            flex-shrink: 0;
        }

        .record-icon.mating-icon { background: rgba(78,204,163,0.15); }
        .record-icon.litter-icon { background: rgba(255,217,61,0.15); }
        .record-icon.event-icon  { background: rgba(100,149,237,0.15); }

        .record-info {
            flex: 1;
            min-width: 0;
        }

        .record-info .rid {
            font-weight: 600;
            font-size: 0.85rem;
        }

        .record-info .rmeta {
            font-size: 0.75rem;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Theme toggle button */
        .theme-toggle {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .theme-toggle:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* Layout */
        .app-container {
            display: grid;
            grid-template-columns: 280px 1fr 320px;
            grid-template-rows: 60px 1fr;
            height: 100vh;
        }

        /* Header */
        .header {
            grid-column: 1 / -1;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
        }

        .header h1 {
            font-size: 1.4rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        /* Sidebar */
        .sidebar {
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            padding: 15px;
            overflow-y: auto;
        }

        .sidebar-section {
            margin-bottom: 20px;
        }

        .sidebar-section h3 {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        /* Buttons */
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: var(--accent);
            color: var(--bg-primary);
        }

        .btn-primary:hover {
            background: #3db892;
        }

        .btn-secondary {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: var(--border-color);
        }

        .btn-danger {
            background: var(--error);
            color: white;
        }

        .btn-full {
            width: 100%;
            justify-content: center;
        }

        .btn-sm {
            padding: 5px 10px;
            font-size: 0.8rem;
        }

        /* Main Content */
        .main-content {
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Timeline Canvas */
        .timeline-container {
            flex: 1;
            overflow: auto;
            background: var(--bg-primary);
            position: relative;
        }

        .timeline-canvas {
            min-width: 100%;
            min-height: 100%;
        }

        /* Detail Panel */
        .detail-panel {
            background: var(--bg-secondary);
            border-left: 1px solid var(--border-color);
            overflow-y: auto;
            padding: 15px;
        }

        .detail-panel h2 {
            font-size: 1.1rem;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        /* Animal List */
        .animal-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .animal-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: var(--bg-card);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }

        .animal-item:hover {
            border-color: var(--accent);
        }

        .animal-item.selected {
            border-color: var(--accent);
            background: rgba(78, 204, 163, 0.1);
        }

        .animal-item.dimmed {
            opacity: 0.3;
        }

        .animal-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .animal-icon.male {
            background: rgba(74, 144, 217, 0.2);
            color: var(--male-color);
        }

        .animal-icon.female {
            background: rgba(233, 30, 140, 0.2);
            color: var(--female-color);
        }

        .animal-icon.dead {
            background: rgba(136, 136, 136, 0.2);
            color: var(--dead-color);
        }

        .animal-info {
            flex: 1;
        }

        .animal-info .id {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .animal-info .meta {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .animal-age {
            font-size: 0.75rem;
            padding: 3px 8px;
            border-radius: 12px;
            background: var(--bg-primary);
        }

        /* Age-based gradient colors */
        .age-young { background: #2ecc71; color: white; }
        .age-adult { background: #3498db; color: white; }
        .age-mature { background: #9b59b6; color: white; }
        .age-old { background: #e67e22; color: white; }
        .age-senior { background: #e74c3c; color: white; }

        /* Forms */
        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 5px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 0.9rem;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        .form-group .error {
            border-color: var(--error);
        }

        .form-error {
            color: var(--error);
            font-size: 0.8rem;
            margin-top: 4px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: var(--bg-secondary);
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            transform: scale(0.9);
            transition: transform 0.3s;
        }

        .modal-overlay.active .modal {
            transform: scale(1);
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            font-size: 1.2rem;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1.5rem;
            line-height: 1;
        }

        .modal-body {
            padding: 20px;
        }

        .modal-footer {
            padding: 15px 20px;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 15px;
        }

        .tab {
            padding: 10px 20px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        .tab:hover {
            color: var(--accent);
        }

        .tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Detail View */
        .detail-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .detail-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }

        .detail-title h2 {
            margin-bottom: 5px;
            border: none;
            padding: 0;
        }

        .detail-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: var(--bg-card);
            padding: 12px;
            border-radius: 8px;
        }

        .stat-card .label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        .stat-card .value {
            font-size: 1.1rem;
            font-weight: 600;
            margin-top: 4px;
        }

        .detail-section {
            margin-bottom: 20px;
        }

        .detail-section h4 {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .relation-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .relation-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            background: var(--bg-card);
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .relation-item:hover {
            background: var(--border-color);
        }

        .relation-badge {
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 4px;
            background: var(--bg-primary);
        }

        /* Timeline SVG */
        .timeline-svg {
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        .timeline-line {
            stroke-width: 4;
            stroke-linecap: round;
        }

        .timeline-line.male {
            stroke: var(--male-color);
        }

        .timeline-line.female {
            stroke: var(--female-color);
        }

        .timeline-line.dead {
            stroke: var(--dead-color);
        }

        .timeline-line.dimmed {
            opacity: 0.15;
        }

        .timeline-line.highlighted {
            stroke-width: 6;
            filter: drop-shadow(0 0 6px currentColor);
        }

        .mating-connector {
            stroke: var(--accent);
            stroke-width: 2;
            stroke-dasharray: 5, 3;
            fill: none;
        }

        .mating-connector.dimmed {
            opacity: 0.15;
        }

        .litter-line {
            stroke: #ffd93d;
            stroke-width: 2;
            fill: none;
        }

        .litter-line.dimmed {
            opacity: 0.15;
        }

        .event-marker {
            cursor: pointer;
        }

        .event-marker circle.event-dot {
            transition: r 0.15s ease, filter 0.15s ease;
        }

        .event-marker:hover circle.event-dot {
            filter: brightness(1.4);
        }

        .event-marker circle.event-hit {
            fill: transparent;
            stroke: none;
        }

        .animal-node {
            cursor: pointer;
        }

        .animal-node:hover .node-circle {
            stroke-width: 3;
        }

        /* Stats Bar */
        .stats-bar {
            display: flex;
            gap: 20px;
            padding: 10px 20px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
        }

        .stats-bar .stat {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
        }

        .stats-bar .stat-value {
            font-weight: 600;
            color: var(--accent);
        }

        /* Toast */
        .toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            padding: 12px 20px;
            border-radius: 8px;
            background: var(--bg-card);
            border-left: 4px solid var(--accent);
            animation: slideIn 0.3s ease;
        }

        .toast.error {
            border-color: var(--error);
        }

        .toast.warning {
            border-color: var(--warning);
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Checkbox Group */
        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            max-height: 150px;
            overflow-y: auto;
            padding: 10px;
            background: var(--bg-card);
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 10px;
            background: var(--bg-primary);
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .checkbox-item:hover {
            background: var(--border-color);
        }

        .checkbox-item input {
            width: auto;
        }

        /* Toolbar */
        .toolbar {
            display: flex;
            gap: 10px;
            padding: 10px 15px;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
        }

        .toolbar-group {
            display: flex;
            gap: 5px;
        }

        /* Search */
        .search-box {
            position: relative;
            margin-bottom: 15px;
        }

        .search-box input {
            width: 100%;
            padding: 10px 10px 10px 35px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--bg-card);
            color: var(--text-primary);
        }

        .search-box::before {
            content: "🔍";
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.9rem;
        }

        /* Filter Tags */
        .filter-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 15px;
        }

        .filter-tag {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            cursor: pointer;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            transition: all 0.2s;
        }

        .filter-tag:hover,
        .filter-tag.active {
            background: var(--accent);
            color: var(--bg-primary);
            border-color: var(--accent);
        }

        /* Pup name list */
        .pup-name-input:focus {
            outline: none;
            border-color: var(--accent) !important;
        }
        .pup-sex-select:focus {
            outline: none;
            border-color: var(--accent) !important;
        }

        /* Hidden file input */
        .hidden-input {
            display: none;
        }

        /* Confirm Dialog */
        .confirm-dialog {
            text-align: center;
        }

        .confirm-dialog .icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .confirm-dialog p {
            margin-bottom: 20px;
            color: var(--text-secondary);
        }

        .confirm-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <h1>🐭 Colony Management System</h1>
            <div class="header-actions">
                <button class="theme-toggle" onclick="toggleTheme()" id="themeToggleBtn">☀️ Light Theme</button>
                <button class="btn btn-secondary" onclick="exportXML()">📤 Export XML</button>
                <button class="btn btn-secondary" onclick="document.getElementById('importFile').click()">📥 Import XML</button>
                <input type="file" id="importFile" class="hidden-input" accept=".xml" onchange="importXML(event)">
            </div>
        </header>

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-section">
                <h3>Quick Actions</h3>
                <button class="btn btn-primary btn-full" onclick="openModal('addAnimal')">➕ Add Animal</button>
                <button class="btn btn-secondary btn-full" style="margin-top:8px" onclick="openModal('addMating')">🔗 New Mating</button>
                <button class="btn btn-secondary btn-full" style="margin-top:8px" onclick="openModal('addLitter')">🐣 Record Litter</button>
                <button class="btn btn-secondary btn-full" style="margin-top:8px" onclick="openModal('addEvent')">📅 Add Event</button>
            </div>

            <div class="sidebar-section">
                <h3>Filters</h3>
                <div class="filter-tags">
                    <span class="filter-tag active" data-filter="all" onclick="setFilter('all')">All</span>
                    <span class="filter-tag" data-filter="active" onclick="setFilter('active')">Active</span>
                    <span class="filter-tag" data-filter="male" onclick="setFilter('male')">♂ Males</span>
                    <span class="filter-tag" data-filter="female" onclick="setFilter('female')">♀ Females</span>
                    <span class="filter-tag" data-filter="dead" onclick="setFilter('dead')">Dead</span>
                </div>
            </div>

            <div class="sidebar-section">
                <div class="sidebar-section-header" onclick="toggleSidebarSection('animalsSection', this)">
                    <h3>Animals</h3>
                    <span class="collapse-arrow">▼</span>
                </div>
                <div class="sidebar-collapsible" id="animalsSection">
                    <div class="search-box" style="margin-top:10px">
                        <input type="text" placeholder="Search animals..." oninput="searchAnimals(this.value)">
                    </div>
                    <div class="animal-list" id="animalList"></div>
                </div>
            </div>

            <div class="sidebar-section">
                <div class="sidebar-section-header" onclick="toggleSidebarSection('matingsSection', this)">
                    <h3>Matings</h3>
                    <span class="collapse-arrow">▼</span>
                </div>
                <div class="sidebar-collapsible" id="matingsSection">
                    <div class="search-box" style="margin-top:10px">
                        <input type="text" placeholder="Search matings..." oninput="searchMatings(this.value)">
                    </div>
                    <div class="sidebar-record-list" id="matingList"></div>
                </div>
            </div>

            <div class="sidebar-section">
                <div class="sidebar-section-header" onclick="toggleSidebarSection('littersSection', this)">
                    <h3>Litters</h3>
                    <span class="collapse-arrow">▼</span>
                </div>
                <div class="sidebar-collapsible" id="littersSection">
                    <div class="search-box" style="margin-top:10px">
                        <input type="text" placeholder="Search litters..." oninput="searchLitters(this.value)">
                    </div>
                    <div class="sidebar-record-list" id="litterList"></div>
                </div>
            </div>

            <div class="sidebar-section">
                <div class="sidebar-section-header" onclick="toggleSidebarSection('eventsSection', this)">
                    <h3>Events</h3>
                    <span class="collapse-arrow">▼</span>
                </div>
                <div class="sidebar-collapsible" id="eventsSection">
                    <div class="search-box" style="margin-top:10px">
                        <input type="text" placeholder="Search events..." oninput="searchEvents(this.value)">
                    </div>
                    <div class="sidebar-record-list" id="eventList"></div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="stats-bar">
                <div class="stat">Total: <span class="stat-value" id="statTotal">0</span></div>
                <div class="stat">Active: <span class="stat-value" id="statActive">0</span></div>
                <div class="stat">Males: <span class="stat-value" id="statMales">0</span></div>
                <div class="stat">Females: <span class="stat-value" id="statFemales">0</span></div>
                <div class="stat">Cages: <span class="stat-value" id="statCages">0</span></div>
                <div class="stat">Matings: <span class="stat-value" id="statMatings">0</span></div>
                <div class="stat">Litters: <span class="stat-value" id="statLitters">0</span></div>
            </div>
            <div class="toolbar">
                <div class="toolbar-group">
                    <button class="btn btn-sm btn-secondary" onclick="zoomTimeline(1.2)">🔍+</button>
                    <button class="btn btn-sm btn-secondary" onclick="zoomTimeline(0.8)">🔍−</button>
                    <button class="btn btn-sm btn-secondary" onclick="resetTimelineView()">↺ Reset</button>
                </div>
                <div class="toolbar-group">
                    <button class="btn btn-sm btn-secondary" onclick="clearSelection()">Clear Selection</button>
                </div>
            </div>
            <div class="timeline-container" id="timelineContainer">
                <svg class="timeline-svg" id="timelineSvg"></svg>
            </div>
        </main>

        <!-- Detail Panel -->
        <aside class="detail-panel" id="detailPanel">
            <div id="detailContent">
                <div style="text-align:center;padding:40px 20px;color:var(--text-secondary)">
                    <div style="font-size:3rem;margin-bottom:15px">🐭</div>
                    <p>Select an animal to view details</p>
                </div>
            </div>
        </aside>
    </div>

    <!-- Modals -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modalContent"></div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        // ==================== DATA STORE ====================
        const ColonyData = {
            animals: new Map(),
            matings: new Map(),
            litters: new Map(),
            events: new Map(),
            counters: {
                animal: 0,
                mating: 0,
                litter: 0,
                event: 0
            }
        };

        // ==================== NAME SYSTEM ====================
        // Each animal has an optional animal.name field (user-defined, globally unique)
        // getAnimalName returns name if set, else id
        function getAnimalName(animalId) {
            const animal = ColonyData.animals.get(animalId);
            if (!animal) return animalId;
            return (animal.name && animal.name.trim()) ? animal.name.trim() : animal.id;
        }

        // Returns true if name is unique across all animals (excluding the given animalId)
        function isNameUnique(name, excludeId = null) {
            const trimmed = name.trim().toLowerCase();
            if (!trimmed) return true;
            for (const [id, animal] of ColonyData.animals) {
                if (id === excludeId) continue;
                // Check against both name and id
                if ((animal.name && animal.name.trim().toLowerCase() === trimmed) || id.toLowerCase() === trimmed) return false;
            }
            return true;
        }

        // Set animal name, enforcing global uniqueness
        function setAnimalName(animalId, name) {
            const animal = ColonyData.animals.get(animalId);
            if (!animal) return { success: false, error: 'Animal not found' };
            const trimmed = name.trim();
            if (!trimmed || trimmed === animal.id) {
                animal.name = '';
                return { success: true };
            }
            if (!isNameUnique(trimmed, animalId)) {
                return { success: false, error: `Name "${trimmed}" is already used by another animal` };
            }
            animal.name = trimmed;
            return { success: true };
        }

        // Display label: "Name (ID)" if name differs from id, else just "ID"
        function animalLabel(animalId) {
            const name = getAnimalName(animalId);
            return name !== animalId ? `${name} (${animalId})` : animalId;
        }

        // ==================== ID GENERATION ====================
        function generateId(type) {
            const prefixes = { animal: 'A', mating: 'M', litter: 'L', event: 'E' };
            ColonyData.counters[type]++;
            const num = String(ColonyData.counters[type]).padStart(4, '0');
            return `${prefixes[type]}-${num}`;
        }

        function getNextId(type) {
            const prefixes = { animal: 'A', mating: 'M', litter: 'L', event: 'E' };
            const num = String(ColonyData.counters[type] + 1).padStart(4, '0');
            return `${prefixes[type]}-${num}`;
        }

        function isIdUnique(id) {
            return !ColonyData.animals.has(id) &&
                   !ColonyData.matings.has(id) &&
                   !ColonyData.litters.has(id) &&
                   !ColonyData.events.has(id);
        }

        // ==================== VALIDATION ENGINE ====================
        const Validator = {
            validateAnimal(data, isEdit = false) {
                const errors = [];
                
                if (!isEdit && !data.id) {
                    errors.push('Animal ID is required');
                } else if (!isEdit && !isIdUnique(data.id)) {
                    errors.push('Animal ID already exists');
                }
                
                if (!data.sex || !['M', 'F'].includes(data.sex)) {
                    errors.push('Sex must be M or F');
                }
                
                if (!data.dob) {
                    errors.push('Date of birth is required');
                }
                
                if (!data.cage) {
                    errors.push('Cage number is required');
                }
                
                // Check parent validity
                if (data.fatherId && data.fatherId !== 'unknown') {
                    const father = ColonyData.animals.get(data.fatherId);
                    if (!father) errors.push('Father ID not found');
                    else if (father.sex !== 'M') errors.push('Father must be male');
                }
                
                if (data.motherId && data.motherId !== 'unknown') {
                    const mother = ColonyData.animals.get(data.motherId);
                    if (!mother) errors.push('Mother ID not found');
                    else if (mother.sex !== 'F') errors.push('Mother must be female');
                }
                
                return errors;
            },

            validateMating(data) {
                const errors = [];
                
                if (!data.id) {
                    errors.push('Mating ID is required');
                } else if (!isIdUnique(data.id)) {
                    errors.push('Mating ID already exists');
                }
                
                if (!data.maleId) {
                    errors.push('Male is required');
                } else {
                    const male = ColonyData.animals.get(data.maleId);
                    if (!male) errors.push('Male not found');
                    else if (male.sex !== 'M') errors.push('Selected male is not male');
                    else if (male.status === 'Dead') errors.push('Male is deceased');
                }
                
                if (!data.femaleIds || data.femaleIds.length === 0) {
                    errors.push('At least one female is required');
                } else {
                    data.femaleIds.forEach(fid => {
                        const female = ColonyData.animals.get(fid);
                        if (!female) errors.push(`Female ${fid} not found`);
                        else if (female.sex !== 'F') errors.push(`${fid} is not female`);
                        else if (female.status === 'Dead') errors.push(`${fid} is deceased`);
                    });
                }
                
                if (!data.startDate) {
                    errors.push('Start date is required');
                }
                
                if (data.endDate && data.startDate && new Date(data.endDate) < new Date(data.startDate)) {
                    errors.push('End date cannot be before start date');
                }
                
                // Check for time conflicts
                const conflictErrors = this.checkMatingConflicts(data);
                errors.push(...conflictErrors);
                
                return errors;
            },

            checkMatingConflicts(newMating) {
                const errors = [];
                const newStart = new Date(newMating.startDate);
                const newEnd = newMating.endDate ? new Date(newMating.endDate) : new Date('2099-12-31');
                
                for (const [id, mating] of ColonyData.matings) {
                    if (id === newMating.id) continue;
                    
                    const existStart = new Date(mating.startDate);
                    const existEnd = mating.endDate ? new Date(mating.endDate) : new Date('2099-12-31');
                    
                    // Check overlap
                    if (newStart <= existEnd && newEnd >= existStart) {
                        // Check if same animals
                        if (mating.maleId === newMating.maleId) {
                            errors.push(`Male ${newMating.maleId} is already in mating ${id} during this period`);
                        }
                        
                        newMating.femaleIds.forEach(fid => {
                            if (mating.femaleIds.includes(fid)) {
                                errors.push(`Female ${fid} is already in mating ${id} during this period`);
                            }
                        });
                    }
                }
                
                return errors;
            },

            validateLitter(data) {
                const errors = [];
                
                if (!data.id) {
                    errors.push('Litter ID is required');
                } else if (!isIdUnique(data.id)) {
                    errors.push('Litter ID already exists');
                }
                
                if (!data.matingId) {
                    errors.push('Mating reference is required');
                } else {
                    const mating = ColonyData.matings.get(data.matingId);
                    if (!mating) {
                        errors.push('Mating not found');
                    } else {
                        if (data.dob && new Date(data.dob) < new Date(mating.startDate)) {
                            errors.push('Litter DOB cannot be before mating start date');
                        }
                        // One litter per mating constraint
                        const existingLitter = [...ColonyData.litters.values()].find(l => l.matingId === data.matingId && l.id !== data.id);
                        if (existingLitter) {
                            errors.push(`Mating ${data.matingId} already has a litter (${existingLitter.id}). One mating can only produce one litter.`);
                        }
                    }
                }
                
                if (!data.dob) {
                    errors.push('Date of birth is required');
                }
                
                const total = parseInt(data.totalPups) || 0;
                const males = parseInt(data.maleCount) || 0;
                const females = parseInt(data.femaleCount) || 0;
                
                if (total <= 0) {
                    errors.push('Total pups must be greater than 0');
                }
                
                if (males + females !== total) {
                    errors.push('Male + Female count must equal total pups');
                }
                
                return errors;
            },

            validateEvent(data, isEdit = false) {
                const errors = [];
                
                if (!isEdit) {
                    if (!data.id) {
                        errors.push('Event ID is required');
                    } else if (!isIdUnique(data.id)) {
                        errors.push('Event ID already exists');
                    }
                }
                
                if (!data.animalId) {
                    errors.push('Animal is required');
                } else {
                    const animal = ColonyData.animals.get(data.animalId);
                    if (!animal) {
                        errors.push('Animal not found');
                    } else {
                        // Check event is not before birth (applies to ALL event types including Death)
                        if (data.date && new Date(data.date) < new Date(animal.dob)) {
                            errors.push(`Event date (${data.date}) cannot be before animal birth date (${animal.dob})`);
                        }
                        // Check if event is after death (only for non-death events)
                        const deathEvent = this.getDeathEvent(data.animalId);
                        if (deathEvent && data.type !== 'Death' && data.date && new Date(data.date) > new Date(deathEvent.date)) {
                            errors.push(`Cannot add events after death date (${deathEvent.date})`);
                        }
                    }
                }
                
                if (!data.type) {
                    errors.push('Event type is required');
                }
                
                if (!data.date) {
                    errors.push('Event date is required');
                }
                
                return errors;
            },

            getDeathEvent(animalId) {
                for (const [id, event] of ColonyData.events) {
                    if (event.animalId === animalId && event.type === 'Death') {
                        return event;
                    }
                }
                return null;
            },

            canDeleteAnimal(animalId) {
                // Check for offspring
                for (const [id, animal] of ColonyData.animals) {
                    if (animal.fatherId === animalId || animal.motherId === animalId) {
                        return { allowed: false, reason: 'Animal has offspring' };
                    }
                }
                
                // Check for matings
                for (const [id, mating] of ColonyData.matings) {
                    if (mating.maleId === animalId || mating.femaleIds.includes(animalId)) {
                        return { allowed: false, reason: 'Animal is part of a mating' };
                    }
                }
                
                return { allowed: true };
            }
        };

        // ==================== CRUD OPERATIONS ====================
        function addAnimal(data) {
            const errors = Validator.validateAnimal(data);
            if (errors.length > 0) {
                return { success: false, errors };
            }
            
            const animal = {
                id: data.id,
                name: (data.name && data.name.trim() && data.name.trim() !== data.id) ? data.name.trim() : '',
                sex: data.sex,
                dob: data.dob,
                cage: data.cage,
                status: data.status || 'Active',
                fatherId: data.fatherId || null,
                motherId: data.motherId || null,
                comments: data.comments || ''
            };
            
            ColonyData.animals.set(animal.id, animal);
            updateUI();
            return { success: true, animal };
        }

        function updateAnimal(id, data) {
            const animal = ColonyData.animals.get(id);
            if (!animal) {
                return { success: false, errors: ['Animal not found'] };
            }
            
            const errors = Validator.validateAnimal({ ...animal, ...data }, true);
            if (errors.length > 0) {
                return { success: false, errors };
            }
            
            // Don't allow changing sex if in mating
            if (data.sex && data.sex !== animal.sex) {
                for (const [mid, mating] of ColonyData.matings) {
                    if (mating.maleId === id || mating.femaleIds.includes(id)) {
                        return { success: false, errors: ['Cannot change sex - animal is in a mating'] };
                    }
                }
            }
            
            // Handle name update — just store directly on animal object
            if (data.name !== undefined) {
                const trimmed = (data.name || '').trim();
                animal.name = (trimmed && trimmed !== animal.id) ? trimmed : '';
                delete data.name;
            }
            
            Object.assign(animal, data);
            updateUI();
            return { success: true, animal };
        }

        function deleteAnimal(id) {
            const check = Validator.canDeleteAnimal(id);
            if (!check.allowed) {
                return { success: false, errors: [check.reason] };
            }
            
            // Delete associated events
            for (const [eid, event] of ColonyData.events) {
                if (event.animalId === id) {
                    ColonyData.events.delete(eid);
                }
            }
            
            ColonyData.animals.delete(id);
            updateUI();
            return { success: true };
        }

        function addMating(data) {
            const errors = Validator.validateMating(data);
            if (errors.length > 0) {
                return { success: false, errors };
            }
            
            const mating = {
                id: data.id,
                maleId: data.maleId,
                femaleIds: data.femaleIds,
                startDate: data.startDate,
                endDate: data.endDate || null,
                cage: data.cage || '',
                comments: data.comments || ''
            };
            
            ColonyData.matings.set(mating.id, mating);
            updateUI();
            return { success: true, mating };
        }

        function endMating(id, endDate) {
            const mating = ColonyData.matings.get(id);
            if (!mating) {
                return { success: false, errors: ['Mating not found'] };
            }
            
            if (new Date(endDate) < new Date(mating.startDate)) {
                return { success: false, errors: ['End date cannot be before start date'] };
            }
            
            mating.endDate = endDate;
            updateUI();
            return { success: true };
        }

        function addLitter(data) {
            const errors = Validator.validateLitter(data);
            if (errors.length > 0) {
                return { success: false, errors };
            }
            
            const mating = ColonyData.matings.get(data.matingId);
            
            // Calculate litter number for this mating
            let litterNum = 1;
            for (const [id, litter] of ColonyData.litters) {
                if (litter.matingId === data.matingId) {
                    litterNum++;
                }
            }
            
            const litter = {
                id: data.id,
                matingId: data.matingId,
                dob: data.dob,
                totalPups: parseInt(data.totalPups),
                maleCount: parseInt(data.maleCount),
                femaleCount: parseInt(data.femaleCount),
                litterNumber: litterNum,
                children: [],
                comments: data.comments || ''
            };
            
            // Create child animals
            for (let i = 0; i < litter.maleCount; i++) {
                const childId = generateId('animal');
                const child = {
                    id: childId,
                    sex: 'M',
                    dob: data.dob,
                    cage: data.cage || mating.cage || '',
                    status: 'Active',
                    fatherId: mating.maleId,
                    motherId: data.motherId || mating.femaleIds[0],
                    comments: `From litter ${litter.id}`
                };
                ColonyData.animals.set(childId, child);
                litter.children.push(childId);
            }
            
            for (let i = 0; i < litter.femaleCount; i++) {
                const childId = generateId('animal');
                const child = {
                    id: childId,
                    sex: 'F',
                    dob: data.dob,
                    cage: data.cage || mating.cage || '',
                    status: 'Active',
                    fatherId: mating.maleId,
                    motherId: data.motherId || mating.femaleIds[0],
                    comments: `From litter ${litter.id}`
                };
                ColonyData.animals.set(childId, child);
                litter.children.push(childId);
            }
            
            ColonyData.litters.set(litter.id, litter);
            updateUI();
            return { success: true, litter };
        }

        function addEvent(data) {
            const errors = Validator.validateEvent(data);
            if (errors.length > 0) {
                return { success: false, errors };
            }
            
            const event = {
                id: data.id,
                animalId: data.animalId,
                type: data.type,
                date: data.date,
                comments: data.comments || ''
            };
            
            ColonyData.events.set(event.id, event);
            
            // If death event, update animal status
            if (event.type === 'Death') {
                const animal = ColonyData.animals.get(event.animalId);
                if (animal) {
                    animal.status = 'Dead';
                    
                    // End any active matings
                    for (const [id, mating] of ColonyData.matings) {
                        if (!mating.endDate && 
                            (mating.maleId === event.animalId || mating.femaleIds.includes(event.animalId))) {
                            mating.endDate = event.date;
                        }
                    }
                }
            }
            
            if (event.type === 'Separation') {
                const animal = ColonyData.animals.get(event.animalId);
                if (animal) {
                    animal.status = 'Separated';
                }
            }
            
            updateUI();
            return { success: true, event };
        }

        // ==================== LINEAGE ENGINE ====================
        const LineageEngine = {
            getParents(animalId, generations = Infinity, visited = new Set()) {
                if (visited.has(animalId)) return [];
                visited.add(animalId);
                
                const animal = ColonyData.animals.get(animalId);
                if (!animal || generations <= 0) return [];
                
                const parents = [];
                
                if (animal.fatherId && animal.fatherId !== 'unknown') {
                    parents.push(animal.fatherId);
                    if (generations > 1) {
                        parents.push(...this.getParents(animal.fatherId, generations - 1, visited));
                    }
                }
                
                if (animal.motherId && animal.motherId !== 'unknown') {
                    parents.push(animal.motherId);
                    if (generations > 1) {
                        parents.push(...this.getParents(animal.motherId, generations - 1, visited));
                    }
                }
                
                return [...new Set(parents)];
            },

            getOffspring(animalId, generations = Infinity, visited = new Set()) {
                if (visited.has(animalId)) return [];
                visited.add(animalId);
                
                if (generations <= 0) return [];
                
                const offspring = [];
                
                for (const [id, animal] of ColonyData.animals) {
                    if (animal.fatherId === animalId || animal.motherId === animalId) {
                        offspring.push(id);
                        if (generations > 1) {
                            offspring.push(...this.getOffspring(id, generations - 1, visited));
                        }
                    }
                }
                
                return [...new Set(offspring)];
            },

            getMates(animalId) {
                const mates = new Set();
                
                for (const [id, mating] of ColonyData.matings) {
                    if (mating.maleId === animalId) {
                        mating.femaleIds.forEach(fid => mates.add(fid));
                    }
                    if (mating.femaleIds.includes(animalId)) {
                        mates.add(mating.maleId);
                    }
                }
                
                return [...mates];
            },

            getRelatedAnimals(animalId) {
                const related = new Set();
                
                this.getParents(animalId).forEach(id => related.add(id));
                this.getOffspring(animalId).forEach(id => related.add(id));
                this.getMates(animalId).forEach(id => related.add(id));
                
                return [...related];
            },

            getMatings(animalId) {
                const matings = [];
                for (const [id, mating] of ColonyData.matings) {
                    if (mating.maleId === animalId || mating.femaleIds.includes(animalId)) {
                        matings.push(mating);
                    }
                }
                return matings;
            },

            getLitters(animalId) {
                const matings = this.getMatings(animalId);
                const litters = [];
                for (const [id, litter] of ColonyData.litters) {
                    if (matings.some(m => m.id === litter.matingId)) {
                        litters.push(litter);
                    }
                }
                return litters;
            }
        };

        // ==================== UI STATE ====================
        let selectedAnimalId = null;
        let selectedMatingId = null;
        let selectedLitterId = null;
        let selectedEventId = null;
        let currentFilter = 'all';
        let searchQuery = '';
        let searchMatingQuery = '';
        let searchLitterQuery = '';
        let searchEventQuery = '';
        let timelineZoom = 1;
        let timelinePan = { x: 0, y: 0 };
        let isDarkTheme = true;

        // ==================== THEME ====================
        function toggleTheme() {
            isDarkTheme = !isDarkTheme;
            document.body.classList.toggle('theme-light', !isDarkTheme);
            document.getElementById('themeToggleBtn').textContent = isDarkTheme ? '☀️ Light Theme' : '🌙 Dark Theme';
        }

        // ==================== SIDEBAR COLLAPSE ====================
        function toggleSidebarSection(sectionId, header) {
            const section = document.getElementById(sectionId);
            const isCollapsed = section.classList.toggle('collapsed');
            header.classList.toggle('collapsed', isCollapsed);
        }

        // ==================== UI UPDATES ====================
        function updateUI() {
            renderAnimalList();
            renderMatingList();
            renderLitterList();
            renderEventList();
            renderTimeline();
            updateStats();
            if (selectedAnimalId) {
                renderDetailPanel(selectedAnimalId);
            }
        }

        function updateStats() {
            const animals = [...ColonyData.animals.values()];
            const activeAnimals = animals.filter(a => a.status === 'Active');
            const activeCages = new Set(activeAnimals.map(a => a.cage)).size;
            document.getElementById('statTotal').textContent = animals.length;
            document.getElementById('statActive').textContent = activeAnimals.length;
            document.getElementById('statMales').textContent = animals.filter(a => a.sex === 'M').length;
            document.getElementById('statFemales').textContent = animals.filter(a => a.sex === 'F').length;
            document.getElementById('statCages').textContent = activeCages;
            document.getElementById('statMatings').textContent = ColonyData.matings.size;
            document.getElementById('statLitters').textContent = ColonyData.litters.size;
        }

        function renderAnimalList() {
            const container = document.getElementById('animalList');
            let animals = [...ColonyData.animals.values()];
            
            // Apply filter
            if (currentFilter === 'active') {
                animals = animals.filter(a => a.status === 'Active');
            } else if (currentFilter === 'male') {
                animals = animals.filter(a => a.sex === 'M');
            } else if (currentFilter === 'female') {
                animals = animals.filter(a => a.sex === 'F');
            } else if (currentFilter === 'dead') {
                animals = animals.filter(a => a.status === 'Dead');
            }
            
            // Apply search
            if (searchQuery) {
                const q = searchQuery.toLowerCase();
                animals = animals.filter(a => 
                    a.id.toLowerCase().includes(q) ||
                    getAnimalName(a.id).toLowerCase().includes(q) ||
                    a.cage.toLowerCase().includes(q) ||
                    (a.comments && a.comments.toLowerCase().includes(q))
                );
            }
            
            // Sort by ID
            animals.sort((a, b) => a.id.localeCompare(b.id));
            
            // Get related animals for dimming
            const relatedIds = selectedAnimalId ? 
                new Set([selectedAnimalId, ...LineageEngine.getRelatedAnimals(selectedAnimalId)]) : 
                null;
            
            container.innerHTML = animals.map(animal => {
                const age = calculateAge(animal.dob, animal.id);
                const ageClass = getAgeClass(age);
                const isDead = animal.status === 'Dead';
                const isSelected = animal.id === selectedAnimalId;
                const isDimmed = relatedIds && !relatedIds.has(animal.id);
                const displayName = getAnimalName(animal.id);
                
                return `
                    <div class="animal-item ${isSelected ? 'selected' : ''} ${isDimmed ? 'dimmed' : ''}" 
                         onclick="selectAnimal('${animal.id}')">
                        <div class="animal-icon ${animal.sex === 'M' ? 'male' : 'female'} ${isDead ? 'dead' : ''}">
                            ${animal.sex === 'M' ? '♂' : '♀'}
                        </div>
                        <div class="animal-info">
                            <div class="id">${displayName !== animal.id ? `<span style="font-weight:700">${displayName}</span> <span style="color:var(--text-secondary);font-size:0.8rem">${animal.id}</span>` : animal.id}</div>
                            <div class="meta">Cage: ${animal.cage} • ${animal.status}</div>
                        </div>
                        <span class="animal-age ${ageClass}">${age}d</span>
                    </div>
                `;
            }).join('');
        }

        function calculateAge(dob, animalId) {
            const birth = new Date(dob);
            // If animal has a death event, age stops at that date
            let endDate = new Date();
            if (animalId) {
                const deathEv = Validator.getDeathEvent ? Validator.getDeathEvent(animalId) : null;
                if (deathEv) endDate = new Date(deathEv.date);
            }
            const diffTime = Math.abs(endDate - birth);
            return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        }

        function getAgeClass(days) {
            if (days < 21) return 'age-young';
            if (days < 60) return 'age-adult';
            if (days < 180) return 'age-mature';
            if (days < 365) return 'age-old';
            return 'age-senior';
        }

            const result = setAnimalName(animalId, newName);

                // Revert the input to the previous valid name

            // Reflect everywhere
            renderAnimalList();
            renderMatingList();
            renderLitterList();
            renderEventList();
            renderTimeline();
            updateStats();
            // Update the detail panel subtitle without full re-render
            const animal = ColonyData.animals.get(animalId);

            const container = document.getElementById('matingList');
            let matings = [...ColonyData.matings.values()];
            if (searchMatingQuery) {
                const q = searchMatingQuery.toLowerCase();
                matings = matings.filter(m =>
                    m.id.toLowerCase().includes(q) ||
                    m.maleId.toLowerCase().includes(q) ||
                    m.femaleIds.some(f => f.toLowerCase().includes(q)) ||
                    (m.cage && m.cage.toLowerCase().includes(q)) ||
                    (m.comments && m.comments.toLowerCase().includes(q))
                );
            }
            if (matings.length === 0) {
                container.innerHTML = `<div style="color:var(--text-secondary);font-size:0.8rem;padding:6px 0">${searchMatingQuery ? 'No matches' : 'No matings yet'}</div>`;

                const isSelected = m.id === selectedMatingId;
                const status = m.endDate ? `${m.startDate} – ${m.endDate}` : `${m.startDate} → ongoing`;
                return `
                    <div class="sidebar-record-item ${isSelected ? 'selected' : ''}" onclick="selectMating('${m.id}')">

        // ==================== DELETE MATINGS / LITTERS / EVENTS ====================
        function confirmDeleteMating(matingId) {
            const litter = [...ColonyData.litters.values()].find(l => l.matingId === matingId);
            const eventsAffected = litter
                ? [...ColonyData.events.values()].filter(e => litter.children.includes(e.animalId))
                : [];
            const html = `
                <div class="modal-header">
                    <h2>⚠️ Confirm Delete Mating</h2>
                    <button class="modal-close" onclick="closeModal()">×</button>
                </div>
                <div class="modal-body">
                    <div class="confirm-dialog">
                        <div class="icon">🗑️</div>
                        <p>Delete mating <strong>${matingId}</strong>?</p>
                        ${litter ? `<p style="color:var(--warning);margin-top:8px">⚠️ This will also delete litter <strong>${litter.id}</strong> and its ${litter.children.length} offspring animals${eventsAffected.length ? ` and ${eventsAffected.length} associated events` : ''}.</p>` : ''}
                        <p style="color:var(--text-secondary);font-size:0.85rem;margin-top:8px">This action cannot be undone.</p>
                        <div class="confirm-actions">
                            <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                            <button class="btn btn-danger" onclick="executeDeleteMating('${matingId}')">Delete</button>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('modalContent').innerHTML = html;
            document.getElementById('modalOverlay').classList.add('active');
        }

        function executeDeleteMating(matingId) {
            // Delete associated litter and its children + events
            for (const [lid, litter] of ColonyData.litters) {
                if (litter.matingId === matingId) {
                    // Delete child animals and their events
                    litter.children.forEach(cid => {
                        for (const [eid, ev] of ColonyData.events) {
                            if (ev.animalId === cid) ColonyData.events.delete(eid);
                        }
                        ColonyData.animals.delete(cid);
                    });
                    ColonyData.litters.delete(lid);
                }
            }
            ColonyData.matings.delete(matingId);
            selectedMatingId = null;
            selectedLitterId = null;
            closeModal();
            updateUI();
            clearSelection();
            showToast(`Mating ${matingId} and all associated records deleted`);
        }

        function confirmDeleteLitter(litterId) {
            const l = ColonyData.litters.get(litterId);
            if (!l) return;
            const html = `
                <div class="modal-header">
                    <h2>⚠️ Confirm Delete Litter</h2>
                    <button class="modal-close" onclick="closeModal()">×</button>
                </div>
                <div class="modal-body">
                    <div class="confirm-dialog">

                        <p>Delete litter <strong>${litterId}</strong>?</p>

                        <div class="confirm-actions">
                            <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                            <button class="btn btn-danger" onclick="executeDeleteLitter('${litterId}')">Delete</button>
                        </div>
                    </div>
                </div>

            document.getElementById('modalContent').innerHTML = html;
            document.getElementById('modalOverlay').classList.add('active');
        }

        function executeDeleteLitter(litterId) {
            const l = ColonyData.litters.get(litterId);
            if (!l) return;
            l.children.forEach(cid => {
                for (const [eid, ev] of ColonyData.events) {
                    if (ev.animalId === cid) ColonyData.events.delete(eid);
                }
                ColonyData.animals.delete(cid);
            });
            ColonyData.litters.delete(litterId);
            selectedLitterId = null;

            updateUI();
            clearSelection();

        function confirmDeleteEvent(eventId) {
            const e = ColonyData.events.get(eventId);
            if (!e) return;
            const html = `
                <div class="modal-header">
                    <h2>⚠️ Confirm Delete Event</h2>
                    <button class="modal-close" onclick="closeModal()">×</button>
                </div>
                <div class="modal-body">
                    <div class="confirm-dialog">
                        <div class="icon">🗑️</div>
                        <p>Delete event <strong>${eventId}</strong> (${e.type} on ${e.date} for ${e.animalId})?</p>
                        <p style="color:var(--text-secondary);font-size:0.85rem;margin-top:8px">This action cannot be undone.</p>
                        <div class="confirm-actions">
                            <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                            <button class="btn btn-danger" onclick="executeDeleteEvent('${eventId}')">Delete</button>

                    </div>
                </div>
            `;
            document.getElementById('modalContent').innerHTML = html;
            document.getElementById('modalOverlay').classList.add('active');
        }

        function executeDeleteEvent(eventId) {
            const e = ColonyData.events.get(eventId);
            if (e && e.type === 'Death') {
                // Revert animal status if this was a death event
                const animal = ColonyData.animals.get(e.animalId);
                if (animal && animal.status === 'Dead') animal.status = 'Active';
            }
            ColonyData.events.delete(eventId);
            selectedEventId = null;
            closeModal();
            updateUI();
            clearSelection();
            showToast(`Event ${eventId} deleted`);
        }

        // ==================== DETAIL PANEL ====================
        function renderDetailPanel(animalId) {
            const animal = ColonyData.animals.get(animalId);
            if (!animal) return;
            
            const age = calculateAge(animal.dob, animalId);
            const ageClass = getAgeClass(age);
            const displayName = getAnimalName(animalId);
            const parents = [];
            if (animal.fatherId && animal.fatherId !== 'unknown') {
                parents.push({ id: animal.fatherId, role: 'Father' });
            }
            if (animal.motherId && animal.motherId !== 'unknown') {
                parents.push({ id: animal.motherId, role: 'Mother' });
            }
            const offspring = LineageEngine.getOffspring(animalId, 1);
            const mates = LineageEngine.getMates(animalId);
            const matings = LineageEngine.getMatings(animalId);
            const events = [...ColonyData.events.values()].filter(e => e.animalId === animalId);

            // Find siblings: animals that share a litter with this animal
            const siblings = [];
            for (const [lid, litter] of ColonyData.litters) {
                if (litter.children.includes(animalId)) {
                    litter.children.forEach(cid => {
