        // ==================== TIMELINE VISUALIZATION ====================
        function renderTimeline() {
            const svg = document.getElementById('timelineSvg');
            const container = document.getElementById('timelineContainer');
            
            const animals = [...ColonyData.animals.values()];
            if (animals.length === 0) {
                svg.innerHTML = `
                    <text x="50%" y="50%" text-anchor="middle" fill="#666" font-size="16">
                        No animals yet. Add your first animal to see the timeline.
                    </text>
                `;
                return;
            }
            
            // Calculate date range
            const dates = animals.map(a => new Date(a.dob));
            const minDate = new Date(Math.min(...dates));
            const maxDate = new Date();
            
            // Add padding to dates
            minDate.setDate(minDate.getDate() - 7);
            maxDate.setDate(maxDate.getDate() + 30);
            
            const dayRange = Math.ceil((maxDate - minDate) / (1000 * 60 * 60 * 24));
            
            // Dimensions
            const padding = { top: 60, right: 40, bottom: 40, left: 100 };
            const animalSpacing = 60;
            const dayHeight = 3 * timelineZoom;
            
            const width = padding.left + padding.right + animals.length * animalSpacing;
            const height = padding.top + padding.bottom + dayRange * dayHeight;
            
            svg.setAttribute('width', width);
            svg.setAttribute('height', height);
            svg.setAttribute('viewBox', `0 0 ${width} ${height}`);
            
            // Get related animals for highlighting
            const relatedIds = selectedAnimalId ? 
                new Set([selectedAnimalId, ...LineageEngine.getRelatedAnimals(selectedAnimalId)]) : 
                null;
            
            // Sort animals by DOB
            animals.sort((a, b) => new Date(a.dob) - new Date(b.dob));
            
            // Create position map
            const animalPositions = new Map();
            animals.forEach((animal, index) => {
                animalPositions.set(animal.id, {
                    x: padding.left + index * animalSpacing,
                    startY: padding.top + dateToY(new Date(animal.dob), minDate, dayHeight),
                    endY: animal.status === 'Dead' ? 
                        padding.top + dateToY(getDeathDate(animal.id) || maxDate, minDate, dayHeight) :
                        padding.top + dateToY(maxDate, minDate, dayHeight)
                });
            });
            
            let svgContent = '';
            
            // Draw time axis
            svgContent += `<g class="time-axis">`;
            const monthStart = new Date(minDate);
            monthStart.setDate(1);
            while (monthStart < maxDate) {
                const y = padding.top + dateToY(monthStart, minDate, dayHeight);
                const label = monthStart.toLocaleDateString('en-US', { month: 'short', year: '2-digit' });
                svgContent += `
                    <line x1="${padding.left - 10}" y1="${y}" x2="${width - padding.right}" y2="${y}" 
                          stroke="#2d3a4f" stroke-width="1" stroke-dasharray="5,5"/>
                    <text x="${padding.left - 15}" y="${y + 4}" text-anchor="end" fill="#666" font-size="11">${label}</text>
                `;
                monthStart.setMonth(monthStart.getMonth() + 1);
            }
            svgContent += `</g>`;
            
            // Draw mating connections — arc at top, then vertical line down to litter birth date
            svgContent += `<g class="matings">`;
            for (const [id, mating] of ColonyData.matings) {
                const malePos = animalPositions.get(mating.maleId);
                if (!malePos) continue;
                
                const matingStartY = padding.top + dateToY(new Date(mating.startDate), minDate, dayHeight);
                const matingEndY = mating.endDate ? 
                    padding.top + dateToY(new Date(mating.endDate), minDate, dayHeight) :
                    padding.top + dateToY(maxDate, minDate, dayHeight);
                
                // Find litter for this mating (if any)
                const litter = [...ColonyData.litters.values()].find(l => l.matingId === id);
                const isDimmed = relatedIds && !relatedIds.has(mating.maleId);
                
                mating.femaleIds.forEach(fid => {
                    const femalePos = animalPositions.get(fid);
                    if (!femalePos) return;
                    
                    const dimmed = isDimmed && !relatedIds.has(fid);
                    const midX = (malePos.x + femalePos.x) / 2;

                    // Top arc connecting the two animals at mating start
                    svgContent += `
                        <path d="M ${malePos.x} ${matingStartY} Q ${midX} ${matingStartY - 22} ${femalePos.x} ${matingStartY}"
                              class="mating-connector ${dimmed ? 'dimmed' : ''}" />
                    `;

                    // Vertical dashed line from mating start down to litter birth (or end) along midpoint
                    if (litter && !litter.matingFailure) {
                        const litterY = padding.top + dateToY(new Date(litter.dob), minDate, dayHeight);
                        svgContent += `
                            <line x1="${midX}" y1="${matingStartY}" x2="${midX}" y2="${litterY}"
                                  stroke="${dimmed ? '#4ecca3' : '#4ecca3'}" stroke-width="1.5"
                                  stroke-dasharray="4,3" opacity="${dimmed ? '0.15' : '0.6'}" />
                        `;
                    } else if (litter && litter.matingFailure) {
                        // Mating failure — short stub with X
                        const failY = matingStartY + (matingEndY - matingStartY) * 0.4;
                        svgContent += `
                            <line x1="${midX}" y1="${matingStartY}" x2="${midX}" y2="${failY}"
                                  stroke="#ff6b6b" stroke-width="1.5" stroke-dasharray="3,3" opacity="${dimmed ? '0.15' : '0.7'}" />
                            <text x="${midX}" y="${failY + 4}" text-anchor="middle" fill="#ff6b6b" font-size="11" opacity="${dimmed ? '0.15' : '1'}">✕</text>
                        `;
                    }
                });
            }
            svgContent += `</g>`;
            
            // Draw litter connections and markers
            svgContent += `<g class="litters">`;
            for (const [id, litter] of ColonyData.litters) {
                const mating = ColonyData.matings.get(litter.matingId);
                if (!mating) continue;
                if (litter.matingFailure) continue; // failure marker drawn in matings group

                const litterY = padding.top + dateToY(new Date(litter.dob), minDate, dayHeight);
                const fatherPos = animalPositions.get(mating.maleId);
                const motherPos = animalPositions.get(litter.motherId || mating.femaleIds[0]);
                if (!fatherPos || !motherPos) continue;
                
                const isDimmed = relatedIds && !relatedIds.has(mating.maleId) && !relatedIds.has(litter.motherId || mating.femaleIds[0]);
                const midX = (fatherPos.x + motherPos.x) / 2;
                const dimOpacity = isDimmed ? '0.15' : '1';
                const litterColor = litter.allDead ? 'var(--error)' : '#ffd93d';

                // Diamond marker at litter birth point on the midX line
                const d = 7;
                svgContent += `
                    <g style="opacity:${dimOpacity}" onclick="selectLitter('${litter.id}')" style="cursor:pointer">
                        <polygon points="${midX},${litterY-d} ${midX+d},${litterY} ${midX},${litterY+d} ${midX-d},${litterY}"
                                 fill="${litterColor}" stroke="var(--bg-primary)" stroke-width="1.5"/>
                        ${litter.allDead ? `<text x="${midX}" y="${litterY+4}" text-anchor="middle" fill="white" font-size="8">☠</text>` : ''}
                    </g>
                `;

                // Lines from diamond to each child
                litter.children.forEach(childId => {
                    const childPos = animalPositions.get(childId);
                    if (!childPos) return;
                    const dimmed = isDimmed && !relatedIds.has(childId);
                    svgContent += `
                        <path d="M ${midX} ${litterY} L ${childPos.x} ${childPos.startY}"
                              class="litter-line ${dimmed ? 'dimmed' : ''}" 
                              stroke="${litter.allDead ? 'var(--error)' : '#ffd93d'}" />
                    `;
                });
            }
            svgContent += `</g>`;
            
            // Draw animal life lines and nodes
            svgContent += `<g class="animals">`;
            animals.forEach((animal, index) => {
                const pos = animalPositions.get(animal.id);
                const isDead = animal.status === 'Dead';
                const isSelected = animal.id === selectedAnimalId;
                const isDimmed = relatedIds && !relatedIds.has(animal.id);
                
                // Life line
                svgContent += `
                    <line x1="${pos.x}" y1="${pos.startY}" x2="${pos.x}" y2="${pos.endY}"
                          class="timeline-line ${animal.sex === 'M' ? 'male' : 'female'} ${isDead ? 'dead' : ''} ${isDimmed ? 'dimmed' : ''} ${isSelected ? 'highlighted' : ''}"
                          style="stroke: ${isDead ? 'var(--dead-color)' : (animal.sex === 'M' ? 'var(--male-color)' : 'var(--female-color)')}" />
                `;
                
                // Birth node
                const ageClass = getAgeClass(calculateAge(animal.dob, animal.id));
                svgContent += `
                    <g class="animal-node" onclick="selectAnimal('${animal.id}')" style="opacity: ${isDimmed ? '0.15' : '1'}">
                        <circle cx="${pos.x}" cy="${pos.startY}" r="${isSelected ? 12 : 10}" 
                                fill="${isDead ? 'var(--dead-color)' : (animal.sex === 'M' ? 'var(--male-color)' : 'var(--female-color)')}"
                                stroke="${isSelected ? 'var(--accent)' : 'var(--bg-primary)'}" stroke-width="2" class="node-circle"/>
                        <text x="${pos.x}" y="${pos.startY + 4}" text-anchor="middle" fill="white" font-size="10" font-weight="bold">
                            ${animal.sex === 'M' ? '♂' : '♀'}
                        </text>
                        <text x="${pos.x}" y="${padding.top - 25}" text-anchor="middle" fill="var(--text-primary)" font-size="11" font-weight="600">
                            ${getAnimalName(animal.id)}
                        </text>
                        <text x="${pos.x}" y="${padding.top - 10}" text-anchor="middle" fill="var(--text-secondary)" font-size="9">
                            ${animal.name ? animal.id : animal.cage}
                        </text>
                    </g>
                `;
                
                // Death marker
                if (isDead) {
                    svgContent += `
                        <g class="event-marker" style="opacity: ${isDimmed ? '0.15' : '1'}">
                            <circle cx="${pos.x}" cy="${pos.endY}" r="8" fill="var(--error)"/>
                            <text x="${pos.x}" y="${pos.endY + 4}" text-anchor="middle" fill="white" font-size="10">✕</text>
                        </g>
                    `;
                }
            });
            svgContent += `</g>`;
            
            // Draw events
            svgContent += `<g class="events">`;
            for (const [id, event] of ColonyData.events) {
                if (event.type === 'Death') continue; // Already drawn
                
                const pos = animalPositions.get(event.animalId);
                if (!pos) continue;
                
                const eventY = padding.top + dateToY(new Date(event.date), minDate, dayHeight);
                const isDimmed = relatedIds && !relatedIds.has(event.animalId);
                
                const eventColors = {
                    'Weaning': '#3498db',
                    'Separation': '#9b59b6',
                    'Transfer': '#e67e22',
                    'Health check': '#2ecc71',
                    'Custom': '#95a5a6'
                };
                
                const color = eventColors[event.type] || '#95a5a6';
                
                svgContent += `
                    <g class="event-marker" style="opacity: ${isDimmed ? '0.15' : '1'}" onclick="selectEventFromTimeline('${event.id}')">
                        <circle class="event-dot" cx="${pos.x}" cy="${eventY}" r="6" fill="${color}"/>
                        <circle class="event-hit" cx="${pos.x}" cy="${eventY}" r="14"/>
                    </g>
                `;
            }
            svgContent += `</g>`;
            
            svg.innerHTML = svgContent;
        }

        function dateToY(date, minDate, dayHeight) {
            const days = Math.ceil((date - minDate) / (1000 * 60 * 60 * 24));
            return days * dayHeight;
        }

        function getDeathDate(animalId) {
            for (const [id, event] of ColonyData.events) {
                if (event.animalId === animalId && event.type === 'Death') {
                    return new Date(event.date);
                }
            }
            return null;
        }

        function zoomTimeline(factor) {
            timelineZoom *= factor;
            timelineZoom = Math.max(0.5, Math.min(3, timelineZoom));
            renderTimeline();
        }

        function resetTimelineView() {
            timelineZoom = 1;
            renderTimeline();
        }

        function selectEventFromTimeline(eventId) {
            selectedEventId = eventId;
            selectedMatingId = null;
            selectedLitterId = null;
            selectedAnimalId = null;
            renderAnimalList();
            renderMatingList();
            renderLitterList();
            renderEventList();
            showEventDetail(eventId);
        }

        // ==================== MODALS ====================
        function openModal(type, extraData = null) {
            const overlay = document.getElementById('modalOverlay');
            const content = document.getElementById('modalContent');
            
            let html = '';
            
            switch (type) {
                case 'addAnimal':
                    html = renderAddAnimalModal();
                    break;
                case 'addMating':
                    html = renderAddMatingModal();
                    break;
                case 'addLitter':
                    html = renderAddLitterModal();
                    break;
                case 'addEvent':
                    html = renderAddEventModal(extraData);
                    break;
            }
            
            content.innerHTML = html;
            overlay.classList.add('active');
        }

            document.getElementById('modalOverlay').classList.remove('active');
        }

                </div>
            `;
        }

        function submitAddAnimal(event) {
            event.preventDefault();
            const form = event.target;
            const nameVal = (form.name?.value || '').trim();

            // Check name uniqueness before adding
            if (nameVal && !isNameUnique(nameVal)) {
                showToast(`Name "${nameVal}" is already used by another animal`, 'error');
                return;
            }

            const data = {
                id: form.id.value.trim(),
                sex: form.sex.value,
                dob: form.dob.value,
                cage: form.cage.value.trim(),
                status: form.status.value,
                fatherId: form.fatherId.value,
                motherId: form.motherId.value,
                comments: form.comments.value.trim(),
                name: nameVal
            };
            
            const result = addAnimal(data);
            if (result.success) {
                closeModal();
                showToast(`Animal ${data.id}${nameVal ? ' ("' + nameVal + '")' : ''} added`);
                const num = parseInt(data.id.split('-')[1]);
                if (num >= ColonyData.counters.animal) {
                    ColonyData.counters.animal = num;
                }
            } else {
                result.errors.forEach(err => showToast(err, 'error'));
            }
        }

        function onLitterNext() {
            const allDead = document.getElementById('lf_allDead').checked;
            const matingFailure = document.getElementById('lf_matingFailure')?.checked;
            const id = document.getElementById('lf_id').value.trim();
            const matingId = document.getElementById('lf_matingId').value;
            const dob = document.getElementById('lf_dob').value;
            const males = parseInt(document.getElementById('lf_maleCount').value) || 0;
            const females = parseInt(document.getElementById('lf_femaleCount').value) || 0;
            const total = males + females;
            const errorEl = document.getElementById('lf_stepError');

            if (!id) { errorEl.textContent = 'Litter ID is required'; return; }
            if (!isIdUnique(id)) { errorEl.textContent = 'Litter ID already exists'; return; }
            if (!matingId) { errorEl.textContent = 'Please select a mating'; return; }

            // Mating failure path
            if (matingFailure) {
                submitLitterMatingFailure();
                return;
            }

            if (!dob) { errorEl.textContent = 'Date of birth is required'; return; }
            const mating = ColonyData.matings.get(matingId);
            if (mating && new Date(dob) < new Date(mating.startDate)) {
                errorEl.textContent = `Litter DOB cannot be before mating start date (${mating.startDate})`;
                return;
            }
            if (total <= 0) { errorEl.textContent = 'Enter the number of pups (even if stillborn)'; return; }
            errorEl.textContent = '';

            // All dead → create ghost dead animals and submit
            if (allDead) {
                submitLitterAllDead();
                return;
            }

            // Build step 2 pup list with user-defined IDs
            document.getElementById('litterStep1').style.display = 'none';
            document.getElementById('litterStep2').style.display = 'block';

            const nextNum = ColonyData.counters.animal + 1;
            const pupRows = [];
            for (let i = 0; i < males; i++) {
                const suggestId = `A-${String(nextNum + i).padStart(4,'0')}`;
                pupRows.push({ sex: 'M', suggestId });
            }
            for (let i = 0; i < females; i++) {
                const suggestId = `A-${String(nextNum + males + i).padStart(4,'0')}`;
                pupRows.push({ sex: 'F', suggestId });
            }

                <div style="display:grid;grid-template-columns:68px 1fr 1fr;gap:6px;padding:7px 8px;background:var(--bg-card);border-radius:6px;align-items:center">
                    <select data-pupidx="${idx}" class="pup-sex-select"
                            style="padding:5px 3px;background:var(--bg-primary);color:${p.sex==='M'?'var(--male-color)':'var(--female-color)'};border:1px solid var(--border-color);border-radius:4px;font-size:0.82rem"
                            onchange="onPupSexChange(this)">
                        <option value="M" ${p.sex==='M'?'selected':''}>♂ M</option>
                        <option value="F" ${p.sex==='F'?'selected':''}>♀ F</option>
                    </select>
                    <input type="text" data-pupidx="${idx}" class="pup-id-input"
                           value="${p.suggestId}"
                           placeholder="A-XXXX"
                           style="padding:5px 7px;background:var(--bg-primary);color:var(--text-primary);border:1px solid var(--border-color);border-radius:4px;font-size:0.82rem;font-family:monospace">
                    <input type="text" data-pupidx="${idx}" class="pup-name-input"
                           placeholder="e.g. Fluffy"
                           style="padding:5px 7px;background:var(--bg-primary);color:var(--text-primary);border:1px solid var(--border-color);border-radius:4px;font-size:0.82rem">

            document.getElementById('litterModalFooter').innerHTML = `

        function submitLitterMatingFailure() {
            const id = document.getElementById('lf_id').value.trim();
            const matingId = document.getElementById('lf_matingId').value;
            const dob = document.getElementById('lf_dob').value || new Date().toISOString().split('T')[0];
            const comments = document.getElementById('lf_comments').value.trim();

            const mating = ColonyData.matings.get(matingId);
            let litterNum = 1;
            for (const [lid, l] of ColonyData.litters) { if (l.matingId === matingId) litterNum++; }

            const litter = {
                id, matingId, dob, totalPups: 0, maleCount: 0, femaleCount: 0,
                litterNumber: litterNum, children: [],
                comments: comments || 'Mating failure — female not pregnant, separated',
                matingFailure: true
            };
            ColonyData.litters.set(id, litter);
            ColonyData.counters.litter = Math.max(ColonyData.counters.litter, parseInt(id.split('-')[1]));

            // Auto-end the mating on this date
            if (mating && !mating.endDate) mating.endDate = dob;

            // Mark females as Separated
            if (mating) {
                mating.femaleIds.forEach(fid => {
                    const fa = ColonyData.animals.get(fid);
                    if (fa && fa.status === 'Active') fa.status = 'Separated';
                });
            }

            updateUI();
            closeModal();
            showToast(`Mating failure recorded for ${matingId} — females marked Separated`);
        }

        function submitLitterAllDead() {
            const id = document.getElementById('lf_id').value.trim();
            const matingId = document.getElementById('lf_matingId').value;
            const motherId = document.getElementById('lf_motherId')?.value || null;
            const dob = document.getElementById('lf_dob').value;
            const males = parseInt(document.getElementById('lf_maleCount').value) || 0;
            const females = parseInt(document.getElementById('lf_femaleCount').value) || 0;
            const cage = document.getElementById('lf_cage').value.trim();
            const comments = document.getElementById('lf_comments').value.trim();
            const total = males + females;
            const mating = ColonyData.matings.get(matingId);

            let litterNum = 1;
            for (const [lid, l] of ColonyData.litters) { if (l.matingId === matingId) litterNum++; }

            const litter = {
                id, matingId, dob, totalPups: total, maleCount: males, femaleCount: females,
                litterNumber: litterNum, children: [],
                comments: comments || 'All pups born dead (stillbirth)',
                allDead: true
            };

            // Create ghost dead animals (short lines ending 1 day after birth)
            const deadDate = new Date(dob);
            deadDate.setDate(deadDate.getDate() + 1);
            const deadDateStr = deadDate.toISOString().split('T')[0];
            const nextNum = ColonyData.counters.animal + 1;

            for (let i = 0; i < males; i++) {
                const ghostId = `A-${String(nextNum + i).padStart(4,'0')}`;
                const ghost = {
                    id: ghostId, name: '', sex: 'M', dob, cage: cage || mating?.cage || '',
                    status: 'Dead', fatherId: mating?.maleId || null,
                    motherId: motherId || mating?.femaleIds[0] || null,
                    comments: `Stillborn — from litter ${id}`
                };
                ColonyData.animals.set(ghostId, ghost);
                ColonyData.counters.animal++;
                // Auto death event
                const evId = generateId('event');
                ColonyData.events.set(evId, { id: evId, animalId: ghostId, type: 'Death', date: deadDateStr, comments: 'Stillbirth' });
                litter.children.push(ghostId);
            }
            for (let i = 0; i < females; i++) {
                const ghostId = `A-${String(nextNum + males + i).padStart(4,'0')}`;
                const ghost = {
                    id: ghostId, name: '', sex: 'F', dob, cage: cage || mating?.cage || '',
                    status: 'Dead', fatherId: mating?.maleId || null,
                    motherId: motherId || mating?.femaleIds[0] || null,
                    comments: `Stillborn — from litter ${id}`
                };
                ColonyData.animals.set(ghostId, ghost);
                ColonyData.counters.animal++;
                const evId = generateId('event');
                ColonyData.events.set(evId, { id: evId, animalId: ghostId, type: 'Death', date: deadDateStr, comments: 'Stillbirth' });
                litter.children.push(ghostId);
            }

            ColonyData.litters.set(id, litter);
            ColonyData.counters.litter = Math.max(ColonyData.counters.litter, parseInt(id.split('-')[1]));
            updateUI();
            closeModal();
            showToast(`Litter ${id} — ${total} stillborn pups added as dead animals`);
        }

        function submitLitterWithNames() {
            const id = document.getElementById('lf_id').value.trim();
            const matingId = document.getElementById('lf_matingId').value;
            const motherId = document.getElementById('lf_motherId')?.value || null;
            const dob = document.getElementById('lf_dob').value;
            const cage = document.getElementById('lf_cage').value.trim();
            const comments = document.getElementById('lf_comments').value.trim();
            const mating = ColonyData.matings.get(matingId);
            const errorEl = document.getElementById('pupListError');

            const idInputs = document.querySelectorAll('.pup-id-input');
            const sexSelects = document.querySelectorAll('.pup-sex-select');
            const nameInputs = document.querySelectorAll('.pup-name-input');

            // Validate all IDs and names
            const usedIds = new Set();
            const usedNames = new Set();
            const pupDefs = [];
            let valid = true;

            for (let i = 0; i < idInputs.length; i++) {
                const pupId = idInputs[i].value.trim();
                const sex = sexSelects[i].value;
                const name = nameInputs[i].value.trim();

                if (!pupId) { errorEl.textContent = `Pup ${i+1}: Animal ID is required`; return; }
                if (usedIds.has(pupId)) { errorEl.textContent = `Pup ${i+1}: ID "${pupId}" is duplicated in this list`; return; }
                if (!isIdUnique(pupId)) { errorEl.textContent = `Pup ${i+1}: ID "${pupId}" already exists in the colony`; return; }
                usedIds.add(pupId);

                if (name) {
                    if (usedNames.has(name.toLowerCase())) { errorEl.textContent = `Pup ${i+1}: Name "${name}" is duplicated in this list`; return; }
                    if (!isNameUnique(name)) { errorEl.textContent = `Pup ${i+1}: Name "${name}" is already used in the colony`; return; }
                    usedNames.add(name.toLowerCase());
                }

                // Highlight each ID input to give feedback
                idInputs[i].style.borderColor = 'var(--accent)';
                pupDefs.push({ id: pupId, sex, name });
            }

            let maleCount = 0, femaleCount = 0;
            pupDefs.forEach(p => p.sex === 'M' ? maleCount++ : femaleCount++);
            let litterNum = 1;
            for (const [lid, l] of ColonyData.litters) { if (l.matingId === matingId) litterNum++; }

            const litter = {
                id, matingId, dob, totalPups: pupDefs.length, maleCount, femaleCount,
                litterNumber: litterNum, children: [], comments
            };

            pupDefs.forEach(pup => {
                // Update counter so future IDs don't conflict
                const num = parseInt(pup.id.split('-')[1]);
                if (!isNaN(num) && num > ColonyData.counters.animal) ColonyData.counters.animal = num;

                const child = {
                    id: pup.id, name: pup.name || '',
                    sex: pup.sex, dob,
                    cage: cage || mating?.cage || '',
                    status: 'Active',
                    fatherId: mating?.maleId || null,
                    motherId: motherId || mating?.femaleIds[0] || null,
                    comments: `From litter ${litter.id}`
                };
                ColonyData.animals.set(pup.id, child);
                litter.children.push(pup.id);
            });

            ColonyData.litters.set(id, litter);
            ColonyData.counters.litter = Math.max(ColonyData.counters.litter, parseInt(id.split('-')[1]));
            updateUI();
            closeModal();
            showToast(`Litter ${id} recorded — ${pupDefs.length} pups`);
        }

        // ==================== XML IMPORT/EXPORT ====================
        function exportXML() {
            let xml = '<?xml version="1.0" encoding="UTF-8"?>\n<colony>\n\n';
            
            // Animals
            xml += '  <animals>\n';
            for (const [id, animal] of ColonyData.animals) {
                xml += `    <animal id="${animal.id}" sex="${animal.sex}" dob="${animal.dob}" cage="${animal.cage}" status="${animal.status}"`;
                if (animal.name) xml += ` name="${escapeXml(animal.name)}"`;
                if (animal.fatherId) xml += ` fatherId="${animal.fatherId}"`;
                if (animal.motherId) xml += ` motherId="${animal.motherId}"`;
                if (animal.comments) {
                    xml += `>\n      <comments>${escapeXml(animal.comments)}</comments>\n    </animal>\n`;
                } else {
                    xml += ' />\n';
                }
            }
            xml += '  </animals>\n\n';
            
            // Matings
            xml += '  <matings>\n';
            for (const [id, mating] of ColonyData.matings) {
                xml += `    <mating id="${mating.id}" male="${mating.maleId}" startDate="${mating.startDate}"`;
                if (mating.endDate) xml += ` endDate="${mating.endDate}"`;
                if (mating.cage) xml += ` cage="${mating.cage}"`;
                xml += '>\n';
                mating.femaleIds.forEach(fid => {
                    xml += `      <female>${fid}</female>\n`;
                });
                if (mating.comments) {
                    xml += `      <comments>${escapeXml(mating.comments)}</comments>\n`;
                }
                xml += '    </mating>\n';
            }
            xml += '  </matings>\n\n';
            
            // Litters
            xml += '  <litters>\n';
            for (const [id, litter] of ColonyData.litters) {
                xml += `    <litter id="${litter.id}" mating="${litter.matingId}" dob="${litter.dob}" totalPups="${litter.totalPups}" maleCount="${litter.maleCount}" femaleCount="${litter.femaleCount}" litterNumber="${litter.litterNumber}"`;
                if (litter.allDead) xml += ` allDead="true"`;
                if (litter.matingFailure) xml += ` matingFailure="true"`;
                xml += '>\n';
                litter.children.forEach(cid => {
                    xml += `      <child>${cid}</child>\n`;
                });
                if (litter.comments) {
                    xml += `      <comments>${escapeXml(litter.comments)}</comments>\n`;
                }
                xml += '    </litter>\n';
            }
            xml += '  </litters>\n\n';
            
            // Events
            xml += '  <events>\n';
            for (const [id, event] of ColonyData.events) {
                xml += `    <event id="${event.id}" animal="${event.animalId}" type="${event.type}" date="${event.date}"`;
                if (event.comments) {
                    xml += `>\n      <comments>${escapeXml(event.comments)}</comments>\n    </event>\n`;
                } else {
                    xml += ' />\n';
                }
            }
            xml += '  </events>\n\n';
            
            xml += '</colony>';
            
            // Download
            const blob = new Blob([xml], { type: 'application/xml' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `colony_export_${new Date().toISOString().split('T')[0]}.xml`;
            a.click();
            URL.revokeObjectURL(url);
            
            showToast('Colony data exported successfully');
        }

        function escapeXml(str) {
            return str.replace(/&/g, '&amp;')
                      .replace(/</g, '&lt;')
                      .replace(/>/g, '&gt;')
                      .replace(/"/g, '&quot;')
                      .replace(/'/g, '&apos;');
        }

        function importXML(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const parser = new DOMParser();
                    const xmlDoc = parser.parseFromString(e.target.result, 'text/xml');
                    
                    // Check for parse errors
                    const parseError = xmlDoc.querySelector('parsererror');
                    if (parseError) {
                        throw new Error('Invalid XML format');
                    }
                    
                    // Validate and import
                    const errors = validateXMLImport(xmlDoc);
                    if (errors.length > 0) {
                        errors.forEach(err => showToast(err, 'error'));
                        return;
                    }
                    
                    // Clear existing data
                    ColonyData.animals.clear();
                    ColonyData.matings.clear();
                    ColonyData.litters.clear();
                    ColonyData.events.clear();
                    ColonyData.counters = { animal: 0, mating: 0, litter: 0, event: 0 };
                    
                    // Import animals
                    const animals = xmlDoc.querySelectorAll('animals > animal');
                    animals.forEach(a => {
                        const animal = {
                            id: a.getAttribute('id'),
                            name: a.getAttribute('name') || '',
                            sex: a.getAttribute('sex'),
                            dob: a.getAttribute('dob'),
                            cage: a.getAttribute('cage'),
                            status: a.getAttribute('status') || 'Active',
                            fatherId: a.getAttribute('fatherId') || null,
                            motherId: a.getAttribute('motherId') || null,
                            comments: a.querySelector('comments')?.textContent || ''
                        };
                        ColonyData.animals.set(animal.id, animal);
                        updateCounter('animal', animal.id);
                    });
                    
                    // Import matings
                    const matings = xmlDoc.querySelectorAll('matings > mating');
                    matings.forEach(m => {
                        const femaleEls = m.querySelectorAll('female');
                        const mating = {
                            id: m.getAttribute('id'),
                            maleId: m.getAttribute('male'),
                            femaleIds: [...femaleEls].map(f => f.textContent),
                            startDate: m.getAttribute('startDate'),
                            endDate: m.getAttribute('endDate') || null,
                            cage: m.getAttribute('cage') || '',
                            comments: m.querySelector('comments')?.textContent || ''
                        };
                        ColonyData.matings.set(mating.id, mating);
                        updateCounter('mating', mating.id);
                    });
                    
                    // Import litters
                    const litters = xmlDoc.querySelectorAll('litters > litter');
                    litters.forEach(l => {
                        const childEls = l.querySelectorAll('child');
                        const litter = {
                            id: l.getAttribute('id'),
                            matingId: l.getAttribute('mating'),
                            dob: l.getAttribute('dob'),
                            totalPups: parseInt(l.getAttribute('totalPups')) || 0,
                            maleCount: parseInt(l.getAttribute('maleCount')) || 0,
                            femaleCount: parseInt(l.getAttribute('femaleCount')) || 0,
                            litterNumber: parseInt(l.getAttribute('litterNumber')) || 1,
                            allDead: l.getAttribute('allDead') === 'true',
                            matingFailure: l.getAttribute('matingFailure') === 'true',
                            children: [...childEls].map(c => c.textContent),
                            comments: l.querySelector('comments')?.textContent || ''
                        };
                        ColonyData.litters.set(litter.id, litter);
                        updateCounter('litter', litter.id);
                    });
                    
                    // Import events
                    const events = xmlDoc.querySelectorAll('events > event');
                    events.forEach(ev => {
                        const event = {
                            id: ev.getAttribute('id'),
                            animalId: ev.getAttribute('animal'),
                            type: ev.getAttribute('type'),
                            date: ev.getAttribute('date'),
                            comments: ev.querySelector('comments')?.textContent || ''
                        };
                        ColonyData.events.set(event.id, event);
                        updateCounter('event', event.id);
                    });
                    
                    updateUI();
                    clearSelection();
                    showToast(`Imported: ${ColonyData.animals.size} animals, ${ColonyData.matings.size} matings, ${ColonyData.litters.size} litters, ${ColonyData.events.size} events`);
                    
                } catch (err) {
                    showToast(`Import failed: ${err.message}`, 'error');
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        function updateCounter(type, id) {
            const num = parseInt(id.split('-')[1]);
            if (num > ColonyData.counters[type]) {
                ColonyData.counters[type] = num;
            }
        }

        function validateXMLImport(xmlDoc) {
            const errors = [];
            const allIds = new Set();
            
            // Check for duplicate IDs
            const checkId = (id, type) => {
                if (allIds.has(id)) {
                    errors.push(`Duplicate ID found: ${id}`);
                }
                allIds.add(id);
            };
            
            xmlDoc.querySelectorAll('animals > animal').forEach(a => checkId(a.getAttribute('id'), 'animal'));
            xmlDoc.querySelectorAll('matings > mating').forEach(m => checkId(m.getAttribute('id'), 'mating'));
            xmlDoc.querySelectorAll('litters > litter').forEach(l => checkId(l.getAttribute('id'), 'litter'));
            xmlDoc.querySelectorAll('events > event').forEach(e => checkId(e.getAttribute('id'), 'event'));
            
            // Validate references
            const animalIds = new Set();
            xmlDoc.querySelectorAll('animals > animal').forEach(a => animalIds.add(a.getAttribute('id')));
            
            xmlDoc.querySelectorAll('matings > mating').forEach(m => {
                const maleId = m.getAttribute('male');
                if (!animalIds.has(maleId)) {
                    errors.push(`Mating ${m.getAttribute('id')} references unknown male: ${maleId}`);
                }
                m.querySelectorAll('female').forEach(f => {
                    if (!animalIds.has(f.textContent)) {
                        errors.push(`Mating ${m.getAttribute('id')} references unknown female: ${f.textContent}`);
                    }
                });
            });
            
            const matingIds = new Set();
            xmlDoc.querySelectorAll('matings > mating').forEach(m => matingIds.add(m.getAttribute('id')));
            
            xmlDoc.querySelectorAll('litters > litter').forEach(l => {
                const matingId = l.getAttribute('mating');
                if (!matingIds.has(matingId)) {
                    errors.push(`Litter ${l.getAttribute('id')} references unknown mating: ${matingId}`);
                }
            });
            
            xmlDoc.querySelectorAll('events > event').forEach(e => {
                const animalId = e.getAttribute('animal');
                if (!animalIds.has(animalId)) {
                    errors.push(`Event ${e.getAttribute('id')} references unknown animal: ${animalId}`);
                }
            });
            
            return errors;
        }

        // ==================== INITIALIZATION ====================
        document.addEventListener('DOMContentLoaded', () => {
            updateUI();
            
            // Close modal on overlay click
            document.getElementById('modalOverlay').addEventListener('click', (e) => {
                if (e.target === e.currentTarget) {
                    closeModal();
                }
            });
            
            // Keyboard shortcuts
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    closeModal();
                }
            });
        });

        // Load demo data on first run
        if (ColonyData.animals.size === 0) {
            loadDemoData();
        }
    </script>
